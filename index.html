  <!-- ==================== SERVICE WORKER (Inline Blob URL) ==================== -->
  <script>
  (function() {
    // file:// 프로토콜 체크: Service Worker는 http/https에서만 동작합니다
    if (window.location.protocol === 'file:') {
      console.warn('[SW] file:// 프로토콜에서는 Service Worker를 등록할 수 없습니다.');
      console.warn('[SW] PWA 기능(오프라인 캐싱, 앱 설치)을 사용하려면 HTTP 서버에서 실행해 주세요.');
      console.warn('[SW] 로컬 테스트: python3 start-server.py 또는 npx serve 를 사용하세요.');
      // file:// 환경에서도 기본 기능은 정상 동작합니다 (데이터 저장, 암호화 등)
      return;
    }

    const swCode = `
      const CACHE_NAME = 'memory-vault-v2';
      const STATIC_ASSETS = [
        'https://cdn.tailwindcss.com',
        'https://unpkg.com/dexie@3.2.4/dist/dexie.js',
        'https://unpkg.com/lucide@0.263.1/dist/umd/lucide.js'
      ];

      self.addEventListener('install', (event) => {
        event.waitUntil(
          caches.open(CACHE_NAME).then((cache) => {
            return cache.addAll(STATIC_ASSETS).catch(() => {});
          })
        );
        self.skipWaiting();
      });

      self.addEventListener('activate', (event) => {
        event.waitUntil(
          caches.keys().then((keys) => {
            return Promise.all(
              keys.filter((k) => k !== CACHE_NAME).map((k) => caches.delete(k))
            );
          })
        );
        self.clients.claim();
      });

      self.addEventListener('fetch', (event) => {
        const url = new URL(event.request.url);
        // Do not cache IndexedDB or Abacus AI API calls
        if (url.pathname.includes('/api/') || url.hostname === 'apps.abacus.ai') {
          return;
        }
        event.respondWith(
          caches.match(event.request).then((cached) => {
            const fetchPromise = fetch(event.request).then((response) => {
              if (response && response.status === 200 && response.type === 'basic') {
                const clone = response.clone();
                caches.open(CACHE_NAME).then((cache) => cache.put(event.request, clone));
              }
              return response;
            }).catch(() => cached);
            return cached || fetchPromise;
          })
        );
      });
    `;

   if ('serviceWorker' in navigator) {
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      const swURL = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swURL).then((reg) => {
        console.log('[SW] Registered via Blob URL', reg.scope);
      }).catch((err) => {
        console.warn('[SW] Registration failed:', err);
      });
    }
  })();
  </script>

  <!-- ==================== CRYPTO MODULE ==================== -->
  <script>
  /**
   * CryptoUtil - PBKDF2 key derivation + AES-256-GCM encryption
   */
  window.CryptoUtil = (() => {
    const encoder = new TextEncoder();
    const decoder = new TextDecoder();

    async function deriveKey(pin, salt) {
      const keyMaterial = await window.crypto.subtle.importKey(
        'raw', encoder.encode(pin), 'PBKDF2', false, ['deriveKey']
      );
      return window.crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function encrypt(plainText, pin) {
      const salt = window.crypto.getRandomValues(new Uint8Array(16));
      const iv = window.crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(pin, salt);
      const encrypted = await window.crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        encoder.encode(plainText)
      );
      const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
      combined.set(salt, 0);
      combined.set(iv, salt.length);
      combined.set(new Uint8Array(encrypted), salt.length + iv.length);
      return btoa(String.fromCharCode(...combined));
    }

    async function decrypt(cipherB64, pin) {
      const combined = Uint8Array.from(atob(cipherB64), c => c.charCodeAt(0));
      const salt = combined.slice(0, 16);
      const iv = combined.slice(16, 28);
      const data = combined.slice(28);
      const key = await deriveKey(pin, salt);
      const decrypted = await window.crypto.subtle.decrypt(
        { name: 'AES-GCM', iv },
        key,
        data
      );
      return decoder.decode(decrypted);
    }

    async function hashPin(pin) {
      const data = encoder.encode(pin + '_memory_vault_salt_2024');
      const hash = await window.crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    return { encrypt, decrypt, hashPin };
  })();
  </script>

  <!-- ==================== DB MODULE ==================== -->
  <script>
  /**
   * Database - Dexie.js IndexedDB wrapper
   */
  const db = new Dexie("MemoryVaultDB");
  db.version(1).stores({
    memories: '++id, title, type, folderId, priority, *tags, createdAt, updatedAt',
    folders: '++id, name, color, icon, createdAt',
    settings: 'key'
  });

  window.DB = {
    // Memories
    async addMemory(memory) {
      memory.createdAt = new Date().toISOString();
      memory.updatedAt = new Date().toISOString();
      return db.memories.add(memory);
    },
    async updateMemory(id, changes) {
      changes.updatedAt = new Date().toISOString();
      return db.memories.update(id, changes);
    },
    async deleteMemory(id) {
      return db.memories.delete(id);
    },
    async getMemory(id) {
      return db.memories.get(id);
    },
    async getAllMemories() {
      return db.memories.orderBy('createdAt').reverse().toArray();
    },
    async searchMemories(query) {
      const q = query.toLowerCase();
      const all = await db.memories.toArray();
      return all.filter(m =>
        (m.title && m.title.toLowerCase().includes(q)) ||
        (m.content && m.content.toLowerCase().includes(q)) ||
        (m.tags && m.tags.some(t => t.toLowerCase().includes(q)))
      );
    },
    async getMemoriesByFolder(folderId) {
      return db.memories.where('folderId').equals(folderId).reverse().sortBy('createdAt');
    },
    async getMemoriesByType(type) {
      return db.memories.where('type').equals(type).reverse().sortBy('createdAt');
    },
    async getMemoryCount() {
      return db.memories.count();
    },

    // Folders
    async addFolder(folder) {
      folder.createdAt = new Date().toISOString();
      return db.folders.add(folder);
    },
    async updateFolder(id, changes) {
      return db.folders.update(id, changes);
    },
    async deleteFolder(id) {
      await db.memories.where('folderId').equals(id).modify({ folderId: null });
      return db.folders.delete(id);
    },
    async getAllFolders() {
      return db.folders.orderBy('name').toArray();
    },
    async getFolderCount() {
      return db.folders.count();
    },

    // Settings
    async getSetting(key) {
      const row = await db.settings.get(key);
      return row ? row.value : null;
    },
    async setSetting(key, value) {
      return db.settings.put({ key, value });
    },

    // Export / Import
    async exportAll() {
      const memories = await db.memories.toArray();
      const folders = await db.folders.toArray();
      const settings = await db.settings.toArray();
      return { memories, folders, settings, exportedAt: new Date().toISOString(), version: 1 };
    },
    async importAll(data) {
      await db.transaction('rw', db.memories, db.folders, db.settings, async () => {
        await db.memories.clear();
        await db.folders.clear();
        await db.settings.clear();
        if (data.memories) await db.memories.bulkAdd(data.memories);
        if (data.folders) await db.folders.bulkAdd(data.folders);
        if (data.settings) await db.settings.bulkAdd(data.settings);
      });
    },
    async clearAll() {
      await db.memories.clear();
      await db.folders.clear();
    }
  };
  </script>

  <!-- ==================== STATE MODULE ==================== -->
  <script>
  /**
   * AppState - Global state management with event emitter
   */
  window.AppState = (() => {
    const state = {
      isLocked: true,
      currentTab: 'home',
      currentScreen: 'lock',
      pin: null,
      searchQuery: '',
      selectedFolder: null,
      theme: 'dark',
      encryptionEnabled: false,
      abacusApiKey: ''
    };
    const listeners = {};

    function get(key) { return state[key]; }

    function set(key, value) {
      const old = state[key];
      state[key] = value;
      if (listeners[key]) {
        listeners[key].forEach(fn => fn(value, old));
      }
    }

    function on(key, fn) {
      if (!listeners[key]) listeners[key] = [];
      listeners[key].push(fn);
      return () => { listeners[key] = listeners[key].filter(f => f !== fn); };
    }

    async function loadSettings() {
      const pinHash = await DB.getSetting('pinHash');
      const theme = await DB.getSetting('theme');
      const encryptionEnabled = await DB.getSetting('encryptionEnabled');
      const abacusApiKey = await DB.getSetting('abacusApiKey');
      if (theme) state.theme = theme;
      if (encryptionEnabled !== null) state.encryptionEnabled = !!encryptionEnabled;
      if (abacusApiKey) state.abacusApiKey = abacusApiKey;
      state.isLocked = !!pinHash;
      if (!pinHash) state.isLocked = false;
    }

    return { get, set, on, loadSettings };
  })();
  </script>

  <!-- ==================== UI MODULE ==================== -->
  <script>
  /**
   * UI - Toast, Confirm, Loading, Safe Download utilities
   */
  window.UI = (() => {
    function toast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function confirm(title, message, onConfirm, confirmText = '확인', cancelText = '취소') {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-box fade-in">
          <h3 class="text-lg font-bold mb-2">${title}</h3>
          <p class="text-slate-400 text-sm mb-6">${message}</p>
          <div class="flex gap-3 justify-end">
            <button class="btn btn-secondary" id="modal-cancel">${cancelText}</button>
            <button class="btn btn-danger" id="modal-confirm">${confirmText}</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector('#modal-cancel').onclick = () => overlay.remove();
      overlay.querySelector('#modal-confirm').onclick = () => { overlay.remove(); onConfirm(); };
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }

    let loadingEl = null;
    function showLoading(msg = '처리 중...') {
      if (loadingEl) return;
      loadingEl = document.createElement('div');
      loadingEl.className = 'loading-overlay';
      loadingEl.innerHTML = `<div class="spinner"></div><p class="text-slate-300 text-sm">${msg}</p>`;
      document.body.appendChild(loadingEl);
    }
    function hideLoading() {
      if (loadingEl) { loadingEl.remove(); loadingEl = null; }
    }

    function safeDownload(data, filename, mimeType = 'application/json') {
      const blob = new Blob([typeof data === 'string' ? data : JSON.stringify(data, null, 2)], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function createIcon(name, size = 20) {
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      return el;
    }

    function refreshIcons() {
      if (window.lucide) lucide.createIcons();
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return '방금 전';
      if (diff < 3600000) return Math.floor(diff / 60000) + '분 전';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '시간 전';
      if (diff < 604800000) return Math.floor(diff / 86400000) + '일 전';
      return d.toLocaleDateString('ko-KR');
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    return { toast, confirm, showLoading, hideLoading, safeDownload, createIcon, refreshIcons, formatDate, formatFileSize };
  })();
  </script>

  <!-- ==================== SCREEN: LOCK ==================== -->
  <script>
  /**
   * LockScreen - PIN input, lockout, WebAuthn fingerprint
   */
  window.LockScreen = (() => {
    let pin = '';
    let attempts = 0;
    let lockoutTimer = null;
    let lockoutEnd = 0;
    const MAX_ATTEMPTS = 3;
    const LOCKOUT_SECONDS = 30;

    function show() {
      pin = '';
      AppState.set('currentScreen', 'lock');
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="flex flex-col items-center justify-center min-h-screen p-6 fade-in">
          <div class="text-6xl mb-4">🔐</div>
          <h1 class="text-xl font-bold mb-1">Memory Vault</h1>
          <p class="text-slate-400 text-sm mb-8">PIN을 입력하세요</p>
          <div id="lockout-msg" class="text-red-400 text-sm mb-4 hidden"></div>
          <div id="pin-dots" class="flex gap-3 mb-8">
            ${[0,1,2,3,4,5].map(() => '<div class="pin-dot"></div>').join('')}
          </div>
          <div id="pin-pad" class="grid grid-cols-3 gap-4 mb-6">
            ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="pin-key" data-num="${n}">${n}</button>`).join('')}
            <button class="pin-key" id="pin-bio"><i data-lucide="fingerprint"></i></button>
            <button class="pin-key" data-num="0">0</button>
            <button class="pin-key" id="pin-del"><i data-lucide="delete"></i></button>
          </div>
          <div id="setup-hint" class="text-center text-slate-500 text-xs mt-4 hidden">
            <p>처음 사용 시 입력한 PIN이 비밀번호로 설정됩니다</p>
          </div>
        </div>
      `;
      UI.refreshIcons();
      _bindEvents();
      _checkFirstUse();
    }

    async function _checkFirstUse() {
      const pinHash = await DB.getSetting('pinHash');
      if (!pinHash) {
        document.getElementById('setup-hint').classList.remove('hidden');
      }
    }

    function _bindEvents() {
      document.querySelectorAll('[data-num]').forEach(btn => {
        btn.addEventListener('click', () => _addDigit(btn.dataset.num));
      });
      document.getElementById('pin-del').addEventListener('click', _deleteDigit);
      document.getElementById('pin-bio').addEventListener('click', _tryBiometric);
    }

    function _addDigit(num) {
      if (lockoutEnd > Date.now()) return;
      if (pin.length >= 6) return;
      pin += num;
      _updateDots();
      if (pin.length === 6) {
        setTimeout(_verifyPin, 200);
      }
    }

    function _deleteDigit() {
      pin = pin.slice(0, -1);
      _updateDots();
    }

    function _updateDots() {
      const dots = document.querySelectorAll('.pin-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('filled', i < pin.length);
      });
    }

    async function _verifyPin() {
      const storedHash = await DB.getSetting('pinHash');
      const inputHash = await CryptoUtil.hashPin(pin);

      if (!storedHash) {
        // First-time setup
        await DB.setSetting('pinHash', inputHash);
        AppState.set('pin', pin);
        AppState.set('isLocked', false);
        UI.toast('PIN이 설정되었습니다!', 'success');
        App.navigate('home');
        return;
      }

      if (inputHash === storedHash) {
        attempts = 0;
        AppState.set('pin', pin);
        AppState.set('isLocked', false);
        App.navigate('home');
      } else {
        attempts++;
        pin = '';
        _updateDots();
        _shakeAnimation();
        if (attempts >= MAX_ATTEMPTS) {
          _startLockout();
        } else {
          UI.toast(`잘못된 PIN (${attempts}/${MAX_ATTEMPTS})`, 'error');
        }
      }
    }

    function _shakeAnimation() {
      const dots = document.getElementById('pin-dots');
      if (dots) {
        dots.style.animation = 'none';
        dots.offsetHeight;
        dots.style.animation = 'shake 0.4s ease';
      }
    }

    function _startLockout() {
      lockoutEnd = Date.now() + LOCKOUT_SECONDS * 1000;
      const msg = document.getElementById('lockout-msg');
      msg.classList.remove('hidden');
      lockoutTimer = setInterval(() => {
        const remaining = Math.ceil((lockoutEnd - Date.now()) / 1000);
        if (remaining <= 0) {
          clearInterval(lockoutTimer);
          msg.classList.add('hidden');
          attempts = 0;
        } else {
          msg.textContent = `${remaining}초 후 다시 시도해주세요`;
        }
      }, 1000);
    }

    async function _tryBiometric() {
      if (!window.PublicKeyCredential) {
        UI.toast('이 기기에서는 생체인증을 지원하지 않습니다', 'error');
        return;
      }
      try {
        const credential = await navigator.credentials.get({
          publicKey: {
            challenge: window.crypto.getRandomValues(new Uint8Array(32)),
            timeout: 60000,
            userVerification: 'required',
            rpId: location.hostname || 'localhost'
          }
        });
        if (credential) {
          const storedPin = await DB.getSetting('bioPin');
          if (storedPin) {
            AppState.set('pin', storedPin);
            AppState.set('isLocked', false);
            App.navigate('home');
          } else {
            UI.toast('먼저 PIN으로 로그인 후 생체인증을 등록하세요', 'info');
          }
        }
      } catch (e) {
        UI.toast('생체인증에 실패했습니다', 'error');
      }
    }

    return { show };
  })();
  </script>

    async function _save(editId) {
      const title = document.getElementById('mem-title').value.trim();
      const content = document.getElementById('mem-content').value.trim();
      if (!title || !content) { UI.toast('제목과 내용을 입력하세요', 'error'); return; }

      const folderId = document.getElementById('mem-folder').value ? parseInt(document.getElementById('mem-folder').value) : null;
      const priority = document.getElementById('mem-priority').value;
      const tags = document.getElementById('mem-tags').value.split(',').map(t => t.trim()).filter(Boolean);

      const pin = AppState.get('pin');
      let finalContent = content;
      if (AppState.get('encryptionEnabled') && pin) {
        finalContent = await CryptoUtil.encrypt(content, pin);
      }

      const memory = { title, content: finalContent, type: 'text', folderId, priority, tags, encrypted: AppState.get('encryptionEnabled') };

      try {
        if (editId) {
          await DB.updateMemory(editId, memory);
          UI.toast('기억이 수정되었습니다', 'success');
        } else {
          await DB.addMemory(memory);
          UI.toast('기억이 저장되었습니다', 'success');
        }
        App.navigate('home');
      } catch (e) {
        UI.toast('저장 실패: ' + e.message, 'error');

      try {
        UI.showLoading('AI가 태그를 생성 중...');
        const result = await AbacusAI.callLLM(
          `다음 텍스트에서 관련 태그 5개를 한국어로 추출하세요. 쉼표로 구분하여 태그만 출력하세요:\n\n${content}`,
          '당신은 텍스트 분석 전문가입니다. 태그만 출력하세요.'
        );
        UI.hideLoading();
        if (result) {
          document.getElementById('mem-tags').value = result;
          UI.toast('AI 태그가 생성되었습니다', 'success');
        }
      } catch (e) {
        UI.hideLoading();
        UI.toast('AI 태그 생성 실패', 'error');
      }
    }

    return { show };
  })();

  <script>

  window.ImageForm = (() => {
    let imageData = null;

    async function show(params = {}) {
      AppState.set('currentScreen', 'addMemory');
      imageData = null;
      const folders = await DB.getAllFolders();

      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="p-4 pb-24 fade-in">
          <div class="flex items-center gap-3 mb-6">
            <button onclick="App.goBack()" class="p-2 rounded-lg hover:bg-slate-800">

          </div>
          <div class="space-y-4">
            <div>
              <label class="text-sm text-slate-400 mb-1 block">제목 *</label>
              <input type="text" id="mem-title" placeholder="이미지 제목"/>
            </div>
            <div id="drop-zone" class="drag-zone">
              <i data-lucide="image-plus" class="w-12 h-12 mx-auto mb-3 text-slate-500"></i>
              <p class="text-slate-400">이미지를 드래그하거나 클릭하여 업로드</p>
              <p class="text-slate-500 text-xs mt-1">JPG, PNG, GIF, WebP (최대 10MB)</p>

            </div>
            <div id="preview-area" class="hidden">
              <img id="preview-img" class="w-full rounded-lg max-h-64 object-contain bg-slate-900"/>
              <button id="btn-remove-img" class="text-red-400 text-sm mt-2">이미지 제거</button>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">설명</label>
              <textarea id="mem-content" rows="3" placeholder="이미지에 대한 설명..."></textarea>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">폴더</label>
              <select id="mem-folder">
                <option value="">폴더 없음</option>
                ${folders.map(f => `<option value="${f.id}">${_escapeHtml(f.name)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">태그 (쉼표로 구분)</label>
              <input type="text" id="mem-tags" placeholder="태그1, 태그2"/>
            </div>
            <div class="flex gap-3">
              <button id="btn-ai-desc" class="btn btn-secondary flex-1 flex items-center justify-center gap-2">
                <i data-lucide="sparkles" class="w-4 h-4"></i> AI 분석
              </button>
              <button id="btn-save" class="btn btn-primary flex-1">저장</button>
            </div>
          </div>
        </div>
      `;
      UI.refreshIcons();
      _bindEvents();
    }

    function _bindEvents() {
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');

      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) _handleFile(e.dataTransfer.files[0]); });
      fileInput.addEventListener('change', (e) => { if (e.target.files[0]) _handleFile(e.target.files[0]); });
      document.getElementById('btn-remove-img').addEventListener('click', _removeImage);
      document.getElementById('btn-save').addEventListener('click', _save);
      document.getElementById('btn-ai-desc').addEventListener('click', _aiAnalyze);
    }

    function _handleFile(file) {
      if (file.size > 10 * 1024 * 1024) { UI.toast('10MB 이하의 이미지를 선택하세요', 'error'); return; }
      if (!file.type.startsWith('image/')) { UI.toast('이미지 파일만 업로드 가능합니다', 'error'); return; }
      const reader = new FileReader();
      reader.onload = (e) => {
        imageData = e.target.result;
        document.getElementById('preview-img').src = imageData;
        document.getElementById('preview-area').classList.remove('hidden');
        document.getElementById('drop-zone').classList.add('hidden');
        if (!document.getElementById('mem-title').value) {
          document.getElementById('mem-title').value = file.name.replace(/\.[^/.]+$/, '');
        }
      };
      reader.readAsDataURL(file);
    }

    function _removeImage() {
      imageData = null;
      document.getElementById('preview-area').classList.add('hidden');
      document.getElementById('drop-zone').classList.remove('hidden');
    }

    async function _save() {
      const title = document.getElementById('mem-title').value.trim();
      if (!title) { UI.toast('제목을 입력하세요', 'error'); return; }
      if (!imageData) { UI.toast('이미지를 선택하세요', 'error'); return; }
      const content = document.getElementById('mem-content').value.trim();
      const folderId = document.getElementById('mem-folder').value ? parseInt(document.getElementById('mem-folder').value) : null;
      const tags = document.getElementById('mem-tags').value.split(',').map(t => t.trim()).filter(Boolean);

      try {
        await DB.addMemory({ title, content, type: 'image', imageData, folderId, priority: 'medium', tags, encrypted: false });
        UI.toast('이미지가 저장되었습니다', 'success');
        App.navigate('home');
      } catch (e) {
        UI.toast('저장 실패: ' + e.message, 'error');
      }
    }

    async function _aiAnalyze() {
      if (!imageData) { UI.toast('먼저 이미지를 업로드하세요', 'info'); return; }
      try {
        UI.showLoading('AI가 이미지를 분석 중...');
        const result = await AbacusAI.analyzeImage(imageData);
        UI.hideLoading();
        if (result) {
          document.getElementById('mem-content').value = result;
          UI.toast('AI 분석 완료', 'success');
        }
      } catch (e) {
        UI.hideLoading();
        UI.toast('AI 분석 실패', 'error');
      }
    }

    return { show };
  })();
  </script>

            <h2 class="text-lg font-bold">문서 기억 추가</h2>
          </div>
          <div class="space-y-4">
            <div>
              <label class="text-sm text-slate-400 mb-1 block">제목 *</label>
              <input type="text" id="mem-title" placeholder="문서 제목"/>
            </div>
            <div id="drop-zone" class="drag-zone">
              <i data-lucide="file-up" class="w-12 h-12 mx-auto mb-3 text-slate-500"></i>
              <p class="text-slate-400">문서를 드래그하거나 클릭하여 업로드</p>
              <p class="text-slate-500 text-xs mt-1">PDF, DOCX (최대 20MB)</p>
              <input type="file" id="file-input" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" class="hidden"/>
            </div>
            <div id="doc-info" class="hidden card">
              <div class="flex items-center gap-3">
                <i data-lucide="file" class="w-8 h-8 text-orange-400"></i>
                <div class="flex-1">
                  <p id="doc-name" class="text-sm font-medium truncate"></p>
                  <p id="doc-size" class="text-xs text-slate-400"></p>
                </div>
                <button id="btn-remove-doc" class="text-red-400 text-sm">제거</button>
              </div>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">메모</label>
              <textarea id="mem-content" rows="3" placeholder="문서에 대한 메모..."></textarea>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">폴더</label>
              <select id="mem-folder">
                <option value="">폴더 없음</option>
                ${folders.map(f => `<option value="${f.id}">${_escapeHtml(f.name)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">태그 (쉼표로 구분)</label>
              <input type="text" id="mem-tags" placeholder="태그1, 태그2"/>
            </div>
            <button id="btn-save" class="btn btn-primary w-full">저장</button>
          </div>
        </div>
      `;
      UI.refreshIcons();
      _bindEvents();
    }

    function _bindEvents() {
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) _handleFile(e.dataTransfer.files[0]); });
      fileInput.addEventListener('change', (e) => { if (e.target.files[0]) _handleFile(e.target.files[0]); });
      document.getElementById('btn-remove-doc').addEventListener('click', _removeDoc);
      document.getElementById('btn-save').addEventListener('click', _save);
    }

    function _handleFile(file) {
      if (file.size > 20 * 1024 * 1024) { UI.toast('20MB 이하의 문서를 선택하세요', 'error'); return; }
      const validTypes = ['application/pdf', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
      if (!validTypes.includes(file.type) && !file.name.match(/\.(pdf|docx)$/i)) {
        UI.toast('PDF 또는 DOCX 파일만 지원합니다', 'error'); return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        docData = e.target.result;
        docName = file.name;
        document.getElementById('doc-name').textContent = file.name;
        document.getElementById('doc-size').textContent = UI.formatFileSize(file.size);
        document.getElementById('doc-info').classList.remove('hidden');
        document.getElementById('drop-zone').classList.add('hidden');
        if (!document.getElementById('mem-title').value) {
          document.getElementById('mem-title').value = file.name.replace(/\.[^/.]+$/, '');
        }
        UI.refreshIcons();
      };
      reader.readAsDataURL(file);
    }

    function _removeDoc() {
      docData = null;
      docName = '';
      document.getElementById('doc-info').classList.add('hidden');
      document.getElementById('drop-zone').classList.remove('hidden');
    }

    async function _save() {
      const title = document.getElementById('mem-title').value.trim();
      if (!title) { UI.toast('제목을 입력하세요', 'error'); return; }
      if (!docData) { UI.toast('문서를 선택하세요', 'error'); return; }
      const content = document.getElementById('mem-content').value.trim();
      const folderId = document.getElementById('mem-folder').value ? parseInt(document.getElementById('mem-folder').value) : null;
      const tags = document.getElementById('mem-tags').value.split(',').map(t => t.trim()).filter(Boolean);

      try {
        await DB.addMemory({ title, content, type: 'document', docData, docName, folderId, priority: 'medium', tags, encrypted: false });
        UI.toast('문서가 저장되었습니다', 'success');
        App.navigate('home');
      } catch (e) {
        UI.toast('저장 실패: ' + e.message, 'error');
      }
    }

    return { show };
  })();
  </script>

  <script>
  /**
   * VoiceForm - Web Audio API visualizer + Speech-to-Text
   */
  window.VoiceForm = (() => {
    let mediaRecorder = null;
    let audioChunks = [];
    let audioBlob = null;
    let isRecording = false;
    let recognition = null;
    let transcript = '';
    let animationId = null;
    let analyser = null;

    async function show(params = {}) {
      AppState.set('currentScreen', 'addMemory');
      audioBlob = null;
      transcript = '';
      isRecording = false;
      const folders = await DB.getAllFolders();

      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="p-4 pb-24 fade-in">
          <div class="flex items-center gap-3 mb-6">
            <button onclick="App.goBack()" class="p-2 rounded-lg hover:bg-slate-800">
              <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <h2 class="text-lg font-bold">음성 기억 추가</h2>
          </div>
          <div class="space-y-4">
            <div>
              <label class="text-sm text-slate-400 mb-1 block">제목 *</label>
              <input type="text" id="mem-title" placeholder="음성 메모 제목"/>
            </div>
            <div class="card text-center py-8">
              <div id="visualizer" class="voice-visualizer mb-4">
                ${Array(20).fill(0).map(() => '<div class="voice-bar" style="height:4px"></div>').join('')}
              </div>
              <p id="rec-status" class="text-slate-400 text-sm mb-4">녹음 버튼을 눌러 시작하세요</p>
              <div class="flex justify-center gap-4">
                <button id="btn-rec" class="w-16 h-16 rounded-full bg-red-500 flex items-center justify-center hover:bg-red-600 transition">
                  <i data-lucide="mic" class="w-6 h-6 text-white"></i>
                </button>
              </div>
              <div id="audio-player" class="hidden mt-4">
                <audio id="audio-el" controls class="w-full"></audio>
              </div>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">음성 인식 텍스트</label>
              <textarea id="mem-transcript" rows="4" placeholder="음성 인식된 텍스트가 여기에 표시됩니다..."></textarea>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">폴더</label>
              <select id="mem-folder">
                <option value="">폴더 없음</option>
                ${folders.map(f => `<option value="${f.id}">${_escapeHtml(f.name)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">태그 (쉼표로 구분)</label>
              <input type="text" id="mem-tags" placeholder="태그1, 태그2"/>
            </div>
            <button id="btn-save" class="btn btn-primary w-full">저장</button>
          </div>
        </div>
      `;
      UI.refreshIcons();
      document.getElementById('btn-rec').addEventListener('click', _toggleRecording);
      document.getElementById('btn-save').addEventListener('click', _save);
    }

    async function _toggleRecording() {
      if (isRecording) {
        _stopRecording();
      } else {
        _startRecording();
      }
    }

    async function _startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64;
        source.connect(analyser);

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const url = URL.createObjectURL(audioBlob);
          document.getElementById('audio-el').src = url;
          document.getElementById('audio-player').classList.remove('hidden');
          stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
        isRecording = true;

        document.getElementById('rec-status').textContent = '녹음 중...';
        document.getElementById('btn-rec').style.background = '#dc2626';
        _animateVisualizer();
        _startSpeechRecognition();
      } catch (e) {
        UI.toast('마이크 접근 권한이 필요합니다', 'error');
      }
    }

    function _stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      if (recognition) {
        try { recognition.stop(); } catch(e) {}
      }
      isRecording = false;
      cancelAnimationFrame(animationId);
      document.getElementById('rec-status').textContent = '녹음 완료';
      document.getElementById('btn-rec').style.background = '#ef4444';
      document.querySelectorAll('.voice-bar').forEach(b => b.style.height = '4px');
    }

    function _animateVisualizer() {
      if (!isRecording || !analyser) return;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const bars = document.querySelectorAll('.voice-bar');
      bars.forEach((bar, i) => {
        const val = data[i] || 0;
        bar.style.height = Math.max(4, val / 4) + 'px';
      });
      animationId = requestAnimationFrame(_animateVisualizer);
    }

    function _startSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;
      recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.onresult = (e) => {
        let final = '', interim = '';
        for (let i = 0; i < e.results.length; i++) {
          if (e.results[i].isFinal) final += e.results[i][0].transcript;
          else interim += e.results[i][0].transcript;
        }
        transcript = final;
        document.getElementById('mem-transcript').value = final + (interim ? ' ' + interim : '');
      };
      recognition.onerror = () => {};
      recognition.start();
    }

    async function _save() {
      const title = document.getElementById('mem-title').value.trim();
      if (!title) { UI.toast('제목을 입력하세요', 'error'); return; }
      const transcriptText = document.getElementById('mem-transcript').value.trim();
      const folderId = document.getElementById('mem-folder').value ? parseInt(document.getElementById('mem-folder').value) : null;
      const tags = document.getElementById('mem-tags').value.split(',').map(t => t.trim()).filter(Boolean);

      let audioData = null;
      if (audioBlob) {
        audioData = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(audioBlob);
        });
      }

      try {
        await DB.addMemory({ title, content: transcriptText, type: 'voice', audioData, folderId, priority: 'medium', tags, encrypted: false });
        UI.toast('음성이 저장되었습니다', 'success');
        App.navigate('home');
      } catch (e) {
        UI.toast('저장 실패: ' + e.message, 'error');
      }
    }

    return { show };
  })();
  </script>

  <script>
  /**
   * AbacusAI - LLM and Vision API service (only allowed fetch exception)
   */
  window.AbacusAI = (() => {
    async function callLLM(prompt, systemPrompt = '') {
      const apiKey = AppState.get('abacusApiKey');
      if (!apiKey) {
        UI.toast('설정에서 Abacus AI API 키를 입력하세요', 'info');
        return null;
      }
      try {
        const response = await fetch('https://apps.abacus.ai/api/v0/getCompletion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({
            prompt: prompt,
            systemMessage: systemPrompt || '당신은 도움이 되는 한국어 AI 어시스턴트입니다.',
            maxTokens: 500
          })
        });
        const data = await response.json();
        return data.result || data.completion || data.text || JSON.stringify(data);
      } catch (e) {
        console.error('AbacusAI Error:', e);
        throw e;
      }
    }

    async function analyzeImage(base64Image) {
      const apiKey = AppState.get('abacusApiKey');
      if (!apiKey) {
        UI.toast('설정에서 Abacus AI API 키를 입력하세요', 'info');
        return null;
      }
      try {
        const response = await fetch('https://apps.abacus.ai/api/v0/getCompletion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({
            prompt: '이 이미지를 한국어로 상세히 설명해주세요.',
            images: [base64Image],

        });

        return data.result || data.completion || data.text || JSON.stringify(data);

        console.error('AbacusAI Vision Error:', e);

                <div class="text-4xl mb-4">📂</div>
                <p class="text-slate-500">폴더가 없습니다</p>
                <p class="text-slate-600 text-xs mt-1">새 폴더를 만들어 기억을 정리하세요</p>
              </div>
            `}
          </div>
          ${_renderTabBar('folders')}
        </div>
      `;
      UI.refreshIcons();
    }

    function showAddForm() {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-box fade-in">
          <h3 class="text-lg font-bold mb-4">새 폴더</h3>
          <div class="space-y-3">
            <input type="text" id="folder-name" placeholder="폴더 이름"/>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">색상</label>
              <div class="flex gap-2 flex-wrap">
                ${COLORS.map((c, i) => `<button class="w-8 h-8 rounded-full color-pick ${i === 0 ? 'ring-2 ring-white' : ''}" style="background:${c}" data-color="${c}"></button>`).join('')}
              </div>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">아이콘</label>
              <div class="flex gap-2 flex-wrap">
                ${ICONS.map((ic, i) => `<button class="w-8 h-8 rounded-lg bg-slate-700 flex items-center justify-center icon-pick ${i === 0 ? 'ring-2 ring-indigo-400' : ''}" data-icon="${ic}"><i data-lucide="${ic}" class="w-4 h-4"></i></button>`).join('')}
              </div>
            </div>
          </div>
          <div class="flex gap-3 justify-end mt-6">
            <button class="btn btn-secondary" id="folder-cancel">취소</button>
            <button class="btn btn-primary" id="folder-save">생성</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      UI.refreshIcons();

      let selectedColor = COLORS[0];
      let selectedIcon = ICONS[0];

      overlay.querySelectorAll('.color-pick').forEach(btn => {
        btn.addEventListener('click', () => {
          overlay.querySelectorAll('.color-pick').forEach(b => b.classList.remove('ring-2', 'ring-white'));
          btn.classList.add('ring-2', 'ring-white');
          selectedColor = btn.dataset.color;
        });
      });
      overlay.querySelectorAll('.icon-pick').forEach(btn => {
        btn.addEventListener('click', () => {
          overlay.querySelectorAll('.icon-pick').forEach(b => b.classList.remove('ring-2', 'ring-indigo-400'));
          btn.classList.add('ring-2', 'ring-indigo-400');
          selectedIcon = btn.dataset.icon;
        });
      });
      overlay.querySelector('#folder-cancel').onclick = () => overlay.remove();
      overlay.querySelector('#folder-save').onclick = async () => {
        const name = overlay.querySelector('#folder-name').value.trim();
        if (!name) { UI.toast('폴더 이름을 입력하세요', 'error'); return; }
        await DB.addFolder({ name, color: selectedColor, icon: selectedIcon });
        overlay.remove();
        UI.toast('폴더가 생성되었습니다', 'success');
        show();
      };
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }

    async function viewFolder(folderId) {
      const memories = await DB.getMemoriesByFolder(folderId);
      const folders = await DB.getAllFolders();
      const folder = folders.find(f => f.id === folderId);
      if (!folder) return;

      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="pb-24 fade-in">
          <div class="p-4 flex items-center gap-3">
            <button onclick="FolderListScreen.show()" class="p-2 rounded-lg hover:bg-slate-800">
              <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:${folder.color}20">
              <i data-lucide="${folder.icon || 'folder'}" class="w-4 h-4" style="color:${folder.color}"></i>
            </div>
            <h2 class="text-lg font-bold">${_escapeHtml(folder.name)}</h2>
            <span class="text-slate-400 text-sm">(${memories.length})</span>
          </div>
          <div class="px-4">
            ${memories.length ? memories.map(m => HomeScreen._renderMemoryCard(m)).join('') : `
              <div class="empty-state">
                <div class="text-4xl mb-4">📂</div>
                <p class="text-slate-500">이 폴더에 기억이 없습니다</p>
              </div>
            `}
          </div>
          ${_renderTabBar('folders')}
        </div>
      `;
      UI.refreshIcons();
    }

    function deleteFolder(id, name) {
      UI.confirm('폴더 삭제', `"${name}" 폴더를 삭제하시겠습니까?\n폴더 안의 기억은 삭제되지 않습니다.`, async () => {
        await DB.deleteFolder(id);
        UI.toast('폴더가 삭제되었습니다', 'success');
        show();
      }, '삭제');
    }

    return { show, showAddForm, viewFolder, deleteFolder };
  })();
  </script>

  <!-- ==================== SCREEN: SETTINGS ==================== -->
  <script>
  /**
   * SettingsScreen - PIN change, API key, encryption, export/import, theme
   */
  window.SettingsScreen = (() => {
    async function show() {
      AppState.set('currentScreen', 'settings');
      AppState.set('currentTab', 'settings');
      const encEnabled = AppState.get('encryptionEnabled');
      const apiKey = AppState.get('abacusApiKey');
      const memCount = await DB.getMemoryCount();
      const folderCount = await DB.getFolderCount();

      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="pb-24 fade-in">
          <div class="p-4">
            <h2 class="text-lg font-bold mb-4">⚙️ 설정</h2>
            <div class="space-y-3">
              <!-- Security -->
              <div class="card">
                <h3 class="text-sm font-semibold text-slate-400 mb-3">🔒 보안</h3>
                <div class="space-y-3">
                  <button onclick="SettingsScreen.changePin()" class="w-full text-left flex items-center justify-between p-2 rounded-lg hover:bg-slate-800">
                    <span class="text-sm">PIN 변경</span>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500"></i>
                  </button>
                  <div class="flex items-center justify-between p-2">
                    <span class="text-sm">암호화 사용</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                      <input type="checkbox" id="enc-toggle" class="sr-only peer" ${encEnabled ? 'checked' : ''}/>
                      <div class="w-11 h-6 bg-slate-600 peer-checked:bg-indigo-500 rounded-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
                    </label>
                  </div>
                </div>
              </div>

              <!-- AI -->
              <div class="card">
                <h3 class="text-sm font-semibold text-slate-400 mb-3">🤖 AI 설정</h3>
                <div>
                  <label class="text-xs text-slate-400 mb-1 block">Abacus AI API 키</label>
                  <input type="password" id="api-key" placeholder="API 키 입력..." value="${apiKey || ''}"/>
                  <button onclick="SettingsScreen.saveApiKey()" class="btn btn-secondary text-xs mt-2">저장</button>
                </div>
              </div>

              <!-- Data -->
              <div class="card">
                <h3 class="text-sm font-semibold text-slate-400 mb-3">💾 데이터 관리</h3>
                <p class="text-xs text-slate-400 mb-3">기억 ${memCount}개 · 폴더 ${folderCount}개</p>
                <div class="space-y-2">
                  <button onclick="SettingsScreen.exportData()" class="btn btn-secondary w-full flex items-center justify-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i> 데이터 내보내기
                  </button>
                  <button onclick="document.getElementById('import-file').click()" class="btn btn-secondary w-full flex items-center justify-center gap-2">
                    <i data-lucide="upload" class="w-4 h-4"></i> 데이터 가져오기
                  </button>
                  <input type="file" id="import-file" accept=".json" class="hidden"/>
                  <button onclick="SettingsScreen.clearData()" class="btn btn-danger w-full flex items-center justify-center gap-2">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> 모든 데이터 삭제
                  </button>
                </div>
              </div>

              <!-- Lock -->
              <div class="card">
                <button onclick="SettingsScreen.lock()" class="w-full flex items-center justify-center gap-2 text-red-400 py-2">
                  <i data-lucide="lock" class="w-4 h-4"></i> 잠금
                </button>
              </div>

              <!-- About -->
              <div class="card text-center">
                <p class="text-xs text-slate-500">Memory Vault v1.0</p>
                <p class="text-xs text-slate-600">Powered by Abacus AI</p>
              </div>
            </div>
          </div>
          ${_renderTabBar('settings')}
        </div>
      `;
      UI.refreshIcons();

      document.getElementById('enc-toggle').addEventListener('change', async (e) => {
        AppState.set('encryptionEnabled', e.target.checked);
        await DB.setSetting('encryptionEnabled', e.target.checked);
        UI.toast(e.target.checked ? '암호화가 활성화되었습니다' : '암호화가 비활성화되었습니다', 'info');
      });

      document.getElementById('import-file').addEventListener('change', _handleImport);
    }

    function changePin() {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-box fade-in">
          <h3 class="text-lg font-bold mb-4">PIN 변경</h3>
          <div class="space-y-3">
            <input type="password" id="old-pin" placeholder="현재 PIN (6자리)" maxlength="6" inputmode="numeric"/>
            <input type="password" id="new-pin" placeholder="새 PIN (6자리)" maxlength="6" inputmode="numeric"/>
            <input type="password" id="confirm-pin" placeholder="새 PIN 확인" maxlength="6" inputmode="numeric"/>
          </div>
          <div class="flex gap-3 justify-end mt-6">
            <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">취소</button>
            <button class="btn btn-primary" id="btn-change-pin">변경</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector('#btn-change-pin').onclick = async () => {
        const oldPin = overlay.querySelector('#old-pin').value;
        const newPin = overlay.querySelector('#new-pin').value;
        const confirmPin = overlay.querySelector('#confirm-pin').value;
        if (newPin.length !== 6) { UI.toast('PIN은 6자리여야 합니다', 'error'); return; }
        if (newPin !== confirmPin) { UI.toast('새 PIN이 일치하지 않습니다', 'error'); return; }
        const oldHash = await CryptoUtil.hashPin(oldPin);
        const storedHash = await DB.getSetting('pinHash');
        if (oldHash !== storedHash) { UI.toast('현재 PIN이 올바르지 않습니다', 'error'); return; }
        const newHash = await CryptoUtil.hashPin(newPin);
        await DB.setSetting('pinHash', newHash);
        AppState.set('pin', newPin);
        overlay.remove();
        UI.toast('PIN이 변경되었습니다', 'success');
      };
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }

    async function saveApiKey() {
      const key = document.getElementById('api-key').value.trim();
      AppState.set('abacusApiKey', key);
      await DB.setSetting('abacusApiKey', key);
      UI.toast('API 키가 저장되었습니다', 'success');
    }

    async function exportData() {
      try {
        UI.showLoading('데이터 내보내기 중...');
        const data = await DB.exportAll();
        UI.hideLoading();
        UI.safeDownload(data, `memory-vault-backup-${new Date().toISOString().slice(0,10)}.json`);
        UI.toast('데이터가 내보내졌습니다', 'success');
      } catch (e) {
        UI.hideLoading();
        UI.toast('내보내기 실패', 'error');
      }
    }

    function _handleImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          UI.confirm('데이터 가져오기', '현재 모든 데이터가 대체됩니다. 계속하시겠습니까?', async () => {
            UI.showLoading('가져오는 중...');
            await DB.importAll(data);
            UI.hideLoading();
            UI.toast('데이터를 가져왔습니다', 'success');
            show();
          });
        } catch (err) {
          UI.toast('올바른 백업 파일이 아닙니다', 'error');
        }
      };
      reader.readAsText(file);
    }

    function clearData() {
      UI.confirm('모든 데이터 삭제', '모든 기억과 폴더가 삭제됩니다. 복구할 수 없습니다.', async () => {
        await DB.clearAll();
        UI.toast('모든 데이터가 삭제되었습니다', 'success');
        show();
      }, '삭제');
    }

    function lock() {
      AppState.set('isLocked', true);
      AppState.set('pin', null);
      LockScreen.show();
    }

    return { show, changePin, saveApiKey, exportData, clearData, lock };
  })();
  </script>

  <!-- ==================== APP ORCHESTRATOR ==================== -->
  <script>
  /**
   * App - Main entry point, router, navigation
   */
  window.App = (() => {
    const history = [];

    async function init() {
      try {
        await AppState.loadSettings();
        if (AppState.get('isLocked')) {
          LockScreen.show();
        } else {
          HomeScreen.show();
        }
      } catch (e) {
        console.error('App init error:', e);
        LockScreen.show();
      }
    }

    function navigate(screen, params = {}) {
      const current = AppState.get('currentScreen');
      if (current && current !== screen) {
        history.push({ screen: current, params: {} });
      }

      switch (screen) {
        case 'lock': LockScreen.show(); break;
        case 'home': HomeScreen.show(); break;
        case 'addMemory':
          const type = params.type || 'text';
          if (type === 'text') TextForm.show(params);
          else if (type === 'image') ImageForm.show(params);
          else if (type === 'document') DocumentForm.show(params);
          else if (type === 'voice') VoiceForm.show(params);
          else TextForm.show(params);
          break;
        case 'viewMemory': ViewMemoryScreen.show(params); break;
        case 'allMemories': AllMemoriesScreen.show(); break;
        case 'folders': FolderListScreen.show(); break;
        case 'settings': SettingsScreen.show(); break;
        default: HomeScreen.show();
      }
    }

    function goBack() {
      if (history.length > 0) {
        const prev = history.pop();
        navigate(prev.screen, prev.params);
      } else {
        navigate('home');
      }
    }

    return { init, navigate, goBack };
  })();

  window.addEventListener('DOMContentLoaded', () => App.init());
  </script>

</body>
</html>
