  <!-- ==================== SERVICE WORKER (Inline Blob URL) ==================== -->
  <script>
  (function() {
    // file:// 프로토콜 체크: Service Worker는 http/https에서만 동작합니다
    if (window.location.protocol === 'file:') {
      console.warn('[SW] file:// 프로토콜에서는 Service Worker를 등록할 수 없습니다.');
      console.warn('[SW] PWA 기능(오프라인 캐싱, 앱 설치)을 사용하려면 HTTP 서버에서 실행해 주세요.');
      console.warn('[SW] 로컬 테스트: python3 start-server.py 또는 npx serve 를 사용하세요.');
      // file:// 환경에서도 기본 기능은 정상 동작합니다 (데이터 저장, 암호화 등)
      return;
    }

    const swCode = `
      const CACHE_NAME = 'memory-vault-v2';
      const STATIC_ASSETS = [
        'https://cdn.tailwindcss.com',
        'https://unpkg.com/dexie@3.2.4/dist/dexie.js',
        'https://unpkg.com/lucide@0.263.1/dist/umd/lucide.js'
      ];

      self.addEventListener('install', (event) => {
        event.waitUntil(
          caches.open(CACHE_NAME).then((cache) => {
            return cache.addAll(STATIC_ASSETS).catch(() => {});
          })
        );
        self.skipWaiting();
      });

      self.addEventListener('activate', (event) => {
        event.waitUntil(
          caches.keys().then((keys) => {
            return Promise.all(
              keys.filter((k) => k !== CACHE_NAME).map((k) => caches.delete(k))
            );
          })
        );
        self.clients.claim();
      });

      self.addEventListener('fetch', (event) => {
        const url = new URL(event.request.url);
        // Do not cache IndexedDB or Abacus AI API calls
        if (url.pathname.includes('/api/') || url.hostname === 'apps.abacus.ai') {
          return;
        }
        event.respondWith(
          caches.match(event.request).then((cached) => {
            const fetchPromise = fetch(event.request).then((response) => {
              if (response && response.status === 200 && response.type === 'basic') {
                const clone = response.clone();
                caches.open(CACHE_NAME).then((cache) => cache.put(event.request, clone));
              }
              return response;
            }).catch(() => cached);
            return cached || fetchPromise;
          })
        );
      });
    `;

    if ('serviceWorker' in navigator) {
      // Blob URL 기반 SW 등록은 대부분 브라우저에서 지원하지 않습니다.
      // 별도 sw.js 파일이 있는 경우에만 등록합니다.
      if (window.location.protocol === 'https:' || window.location.hostname === 'localhost') {
        navigator.serviceWorker.register('./sw.js', { scope: './' }).then((reg) => {
          console.log('[SW] Registered', reg.scope);
        }).catch((err) => {
          // sw.js 파일이 없는 경우 조용히 무시 (단일 HTML 파일 모드)
          console.info('[SW] sw.js 파일이 없습니다. 오프라인 캐싱이 비활성화됩니다.');
        });
      }
    }
  })();
  </script>

  <!-- ==================== CRYPTO MODULE ==================== -->
  <script>
  /**
   * CryptoUtil - PBKDF2 key derivation + AES-256-GCM encryption
   */
  window.CryptoUtil = (() => {
    const encoder = new TextEncoder();
    const decoder = new TextDecoder();

    async function deriveKey(pin, salt) {
      const keyMaterial = await window.crypto.subtle.importKey(
        'raw', encoder.encode(pin), 'PBKDF2', false, ['deriveKey']
      );
      return window.crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function encrypt(plainText, pin) {
      const salt = window.crypto.getRandomValues(new Uint8Array(16));
      const iv = window.crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(pin, salt);
      const encrypted = await window.crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        encoder.encode(plainText)
      );
      const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
      combined.set(salt, 0);
      combined.set(iv, salt.length);
      combined.set(new Uint8Array(encrypted), salt.length + iv.length);
      return btoa(String.fromCharCode(...combined));
    }

    async function decrypt(cipherB64, pin) {
      const combined = Uint8Array.from(atob(cipherB64), c => c.charCodeAt(0));
      const salt = combined.slice(0, 16);
      const iv = combined.slice(16, 28);
      const data = combined.slice(28);
      const key = await deriveKey(pin, salt);
      const decrypted = await window.crypto.subtle.decrypt(
        { name: 'AES-GCM', iv },
        key,
        data
      );
      return decoder.decode(decrypted);
    }

    async function hashPin(pin) {
      const data = encoder.encode(pin + '_memory_vault_salt_2024');
      const hash = await window.crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    return { encrypt, decrypt, hashPin };
  })();
  </script>

  <!-- ==================== DB MODULE ==================== -->
  <script>
  /**
   * Database - Dexie.js IndexedDB wrapper
   */
  const db = new Dexie("MemoryVaultDB");
  db.version(1).stores({
    memories: '++id, title, type, folderId, priority, *tags, createdAt, updatedAt',
    folders: '++id, name, color, icon, createdAt',
    settings: 'key'
  });

  window.DB = {
    // Memories
    async addMemory(memory) {
      memory.createdAt = new Date().toISOString();
      memory.updatedAt = new Date().toISOString();
      return db.memories.add(memory);
    },
    async updateMemory(id, changes) {
      changes.updatedAt = new Date().toISOString();
      return db.memories.update(id, changes);
    },
    async deleteMemory(id) {
      return db.memories.delete(id);
    },
    async getMemory(id) {
      return db.memories.get(id);
    },
    async getAllMemories() {
      return db.memories.orderBy('createdAt').reverse().toArray();
    },
    async searchMemories(query) {
      const q = query.toLowerCase();
      const all = await db.memories.toArray();
      return all.filter(m =>
        (m.title && m.title.toLowerCase().includes(q)) ||
        (m.content && m.content.toLowerCase().includes(q)) ||
        (m.tags && m.tags.some(t => t.toLowerCase().includes(q)))
      );
    },
    async getMemoriesByFolder(folderId) {
      return db.memories.where('folderId').equals(folderId).reverse().sortBy('createdAt');
    },
    async getMemoriesByType(type) {
      return db.memories.where('type').equals(type).reverse().sortBy('createdAt');
    },
    async getMemoryCount() {
      return db.memories.count();
    },

    // Folders
    async addFolder(folder) {
      folder.createdAt = new Date().toISOString();
      return db.folders.add(folder);
    },
    async updateFolder(id, changes) {
      return db.folders.update(id, changes);
    },
    async deleteFolder(id) {
      await db.memories.where('folderId').equals(id).modify({ folderId: null });
      return db.folders.delete(id);
    },
    async getAllFolders() {
      return db.folders.orderBy('name').toArray();
    },
    async getFolderCount() {
      return db.folders.count();
    },

    // Settings
    async getSetting(key) {
      const row = await db.settings.get(key);
      return row ? row.value : null;
    },
    async setSetting(key, value) {
      return db.settings.put({ key, value });
    },

    // Export / Import
    async exportAll() {
      const memories = await db.memories.toArray();
      const folders = await db.folders.toArray();
      const settings = await db.settings.toArray();
      return { memories, folders, settings, exportedAt: new Date().toISOString(), version: 1 };
    },
    async importAll(data) {
      await db.transaction('rw', db.memories, db.folders, db.settings, async () => {
        await db.memories.clear();
        await db.folders.clear();
        await db.settings.clear();
        if (data.memories) await db.memories.bulkAdd(data.memories);
        if (data.folders) await db.folders.bulkAdd(data.folders);
        if (data.settings) await db.settings.bulkAdd(data.settings);
      });
    },
    async clearAll() {
      await db.memories.clear();
      await db.folders.clear();
    }
  };
  </script>

  <!-- ==================== STATE MODULE ==================== -->
  <script>
  /**
   * AppState - Global state management with event emitter
   */
  window.AppState = (() => {
    const state = {
      isLocked: true,
      currentTab: 'home',
      currentScreen: 'lock',
      pin: null,
      searchQuery: '',
      selectedFolder: null,
      selectedFolderFilter: null,
      theme: 'dark',
      encryptionEnabled: false,
      abacusApiKey: '',
      geminiApiKey: '',
      groqApiKey: '',
      groqSttModel: 'whisper-large-v3',
      geminiModel: 'gemini-3.5-flash',
      geminiProModel: 'gemini-2.5-flash-preview-05-20'
    };
    const listeners = {};

    function get(key) { return state[key]; }

    function set(key, value) {
      const old = state[key];
      state[key] = value;
      if (listeners[key]) {
        listeners[key].forEach(fn => fn(value, old));
      }
    }

    function on(key, fn) {
      if (!listeners[key]) listeners[key] = [];
      listeners[key].push(fn);
      return () => { listeners[key] = listeners[key].filter(f => f !== fn); };
    }

    async function loadSettings() {
      const pinHash = await DB.getSetting('pinHash');
      const theme = await DB.getSetting('theme');
      const encryptionEnabled = await DB.getSetting('encryptionEnabled');
      const abacusApiKey = await DB.getSetting('abacusApiKey');
      const geminiApiKey = await DB.getSetting('geminiApiKey');
      const groqApiKey = await DB.getSetting('groqApiKey');
      const groqSttModel = await DB.getSetting('groqSttModel');
      const geminiModel = await DB.getSetting('geminiModel');
      if (theme) state.theme = theme;
      if (encryptionEnabled !== null) state.encryptionEnabled = !!encryptionEnabled;
      if (abacusApiKey) state.abacusApiKey = abacusApiKey;
      if (geminiApiKey) state.geminiApiKey = geminiApiKey;
      if (groqApiKey) state.groqApiKey = groqApiKey;
      if (groqSttModel) state.groqSttModel = groqSttModel;
      if (geminiModel) state.geminiModel = geminiModel;
      state.isLocked = !!pinHash;
      if (!pinHash) state.isLocked = false;
    }

    return { get, set, on, loadSettings };
  })();
  </script>

  <!-- ==================== UI MODULE ==================== -->
  <script>
  /**
   * UI - Toast, Confirm, Loading, Safe Download utilities
   */
  window.UI = (() => {
    function toast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function confirm(title, message, onConfirm, confirmText = '확인', cancelText = '취소') {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-box fade-in">
          <h3 class="text-lg font-bold mb-2">${title}</h3>
          <p class="text-slate-400 text-sm mb-6">${message}</p>
          <div class="flex gap-3 justify-end">
            <button class="btn btn-secondary" id="modal-cancel">${cancelText}</button>
            <button class="btn btn-danger" id="modal-confirm">${confirmText}</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector('#modal-cancel').onclick = () => overlay.remove();
      overlay.querySelector('#modal-confirm').onclick = () => { overlay.remove(); onConfirm(); };
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }

    let loadingEl = null;
    function showLoading(msg = '처리 중...') {
      if (loadingEl) return;
      loadingEl = document.createElement('div');
      loadingEl.className = 'loading-overlay';
      loadingEl.innerHTML = `<div class="spinner"></div><p class="text-slate-300 text-sm">${msg}</p>`;
      document.body.appendChild(loadingEl);
    }
    function hideLoading() {
      if (loadingEl) { loadingEl.remove(); loadingEl = null; }
    }

    function safeDownload(data, filename, mimeType = 'application/json') {
      const blob = new Blob([typeof data === 'string' ? data : JSON.stringify(data, null, 2)], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function createIcon(name, size = 20) {
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      return el;
    }

    function refreshIcons() {
      if (window.lucide) lucide.createIcons();
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return '방금 전';
      if (diff < 3600000) return Math.floor(diff / 60000) + '분 전';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '시간 전';
      if (diff < 604800000) return Math.floor(diff / 86400000) + '일 전';
      return d.toLocaleDateString('ko-KR');
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    return { toast, confirm, showLoading, hideLoading, safeDownload, createIcon, refreshIcons, formatDate, formatFileSize };
  })();
  </script>

  <script>
  /**
   * ContextMenu - Long press context menu for memory cards
   */
  window.ContextMenu = (() => {
    let activeMenuOverlay = null;
    let longPressTimer = null;
    let isMenuActiveFlag = false;
    let selectionMode = false;
    let selectedIds = new Set();
    const LONG_PRESS_DURATION = 800;

    function isActive() { return isMenuActiveFlag; }
    function isSelectionMode() { return selectionMode; }
    function getSelectedIds() { return selectedIds; }

    function close() {
      if (activeMenuOverlay) {
        activeMenuOverlay.remove();
        activeMenuOverlay = null;
      }
      isMenuActiveFlag = false;
    }

    function exitSelectionMode() {
      selectionMode = false;
      selectedIds.clear();
      close();
      const screen = AppState.get('currentScreen');
      if (screen === 'home') HomeScreen.show();
      else if (screen === 'allMemories') AllMemoriesScreen.show();
      else if (screen === 'folderView') FolderListScreen.show();
    }

    function toggleSelection(id) {
      if (selectedIds.has(id)) selectedIds.delete(id);
      else selectedIds.add(id);
      document.querySelectorAll('[data-memory-id]').forEach(card => {
        const cid = parseInt(card.dataset.memoryId);
        card.classList.toggle('selected-card', selectedIds.has(cid));
      });
    }

    function showMenu(memoryId, x, y) {
      close();
      isMenuActiveFlag = true;

      const overlay = document.createElement('div');
      overlay.className = 'context-menu-overlay';
      
      const menu = document.createElement('div');
      menu.className = 'context-menu';
      const maxX = window.innerWidth - 180;
      const maxY = window.innerHeight - 160;
      menu.style.left = Math.min(x, maxX) + 'px';
      menu.style.top = Math.min(y, maxY) + 'px';

      menu.innerHTML = `
        <div class="context-menu-item" data-action="edit">
          <span>📝</span><span>수정하기</span>
        </div>
        <div class="context-menu-item" data-action="select">
          <span>☑️</span><span>선택 모드</span>
        </div>
        <div class="context-menu-item danger" data-action="delete">
          <span>🗑️</span><span>삭제하기</span>
        </div>
      `;

      overlay.appendChild(menu);
      document.body.appendChild(overlay);
      activeMenuOverlay = overlay;

      menu.querySelectorAll('.context-menu-item').forEach(item => {
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          const action = item.dataset.action;
          close();
          if (action === 'edit') _editMemory(memoryId);
          else if (action === 'select') _enterSelectionMode(memoryId);
          else if (action === 'delete') _deleteMemory(memoryId);
        });
      });

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) close();
      });
    }

    async function _editMemory(id) {
      const m = await DB.getMemory(id);
      if (!m) return;
      if (m.type === 'text') App.navigate('addMemory', { type: 'text', id });
      else if (m.type === 'image') App.navigate('addMemory', { type: 'image', id });
      else if (m.type === 'document') App.navigate('addMemory', { type: 'document', id });
      else if (m.type === 'voice') App.navigate('addMemory', { type: 'voice', id });
    }

    function _enterSelectionMode(memoryId) {
      selectionMode = true;
      selectedIds.clear();
      selectedIds.add(memoryId);
      const screen = AppState.get('currentScreen');
      if (screen === 'home') HomeScreen.show();
      else if (screen === 'allMemories') AllMemoriesScreen.show();
    }

    async function _deleteMemory(id) {
      const m = await DB.getMemory(id);
      if (!m) return;
      UI.confirm('기억 삭제', `"${m.title || '제목 없음'}"을(를) 삭제하시겠습니까?`, async () => {
        await DB.deleteMemory(id);
        UI.toast('기억이 삭제되었습니다', 'success');
        const screen = AppState.get('currentScreen');
        if (screen === 'home') HomeScreen.show();
        else if (screen === 'allMemories') AllMemoriesScreen.show();
        else App.navigate('home');
      }, '삭제');
    }

    async function deleteSelected() {
      if (selectedIds.size === 0) return;
      UI.confirm('선택 삭제', `${selectedIds.size}개의 기억을 삭제하시겠습니까?`, async () => {
        for (const id of selectedIds) {
          await DB.deleteMemory(id);
        }
        UI.toast(`${selectedIds.size}개의 기억이 삭제되었습니다`, 'success');
        exitSelectionMode();
      }, '삭제');
    }

    function bindLongPress(el, memoryId) {
      let startX, startY;
      el.addEventListener('pointerdown', (e) => {
        startX = e.clientX; startY = e.clientY;
        longPressTimer = setTimeout(() => {
          if (navigator.vibrate) navigator.vibrate(50);
          showMenu(memoryId, e.clientX, e.clientY);
        }, LONG_PRESS_DURATION);
      });
      el.addEventListener('pointermove', (e) => {
        if (longPressTimer && (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10)) {
          clearTimeout(longPressTimer); longPressTimer = null;
        }
      });
      el.addEventListener('pointerup', () => { clearTimeout(longPressTimer); longPressTimer = null; });
      el.addEventListener('pointercancel', () => { clearTimeout(longPressTimer); longPressTimer = null; });
      // Prevent default context menu on mobile
      el.addEventListener('contextmenu', (e) => e.preventDefault());
    }

    return { isActive, isSelectionMode, getSelectedIds, close, showMenu, bindLongPress, toggleSelection, deleteSelected, exitSelectionMode };
  })();
  </script>

  <script>
  /**
   * LockScreen - PIN input, lockout, WebAuthn fingerprint
   */
  window.LockScreen = (() => {
    let pin = '';
    let attempts = 0;
    let lockoutTimer = null;
    let lockoutEnd = 0;
    const MAX_ATTEMPTS = 3;
    const LOCKOUT_SECONDS = 30;

    function show() {
      pin = '';
      AppState.set('currentScreen', 'lock');
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="flex flex-col items-center justify-center min-h-screen p-6 fade-in">
          <div class="text-6xl mb-4">🔐</div>
          <h1 class="text-xl font-bold mb-1">Memory Vault</h1>
          <p class="text-slate-400 text-sm mb-8">PIN을 입력하세요</p>
          <div id="lockout-msg" class="text-red-400 text-sm mb-4 hidden"></div>
          <div id="pin-dots" class="flex gap-3 mb-8">
            ${[0,1,2,3,4,5].map(() => '<div class="pin-dot"></div>').join('')}
          </div>
          <div id="pin-pad" class="grid grid-cols-3 gap-4 mb-6">
            ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="pin-key" data-num="${n}">${n}</button>`).join('')}
            <button class="pin-key" id="pin-bio"><i data-lucide="fingerprint"></i></button>
            <button class="pin-key" data-num="0">0</button>
            <button class="pin-key" id="pin-del"><i data-lucide="delete"></i></button>
          </div>
          <div id="setup-hint" class="text-center text-slate-500 text-xs mt-4 hidden">
            <p>처음 사용 시 입력한 PIN이 비밀번호로 설정됩니다</p>
          </div>
          <button id="btn-quick-rec"
            onclick="LockScreen.quickRecord()"
            style="
              margin-top:24px;padding:14px 32px;border-radius:50px;
              background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);
              color:#f87171;font-size:14px;font-weight:600;cursor:pointer;
              display:flex;align-items:center;gap:8px;
            ">
            🎤 빠른 녹음 (PIN 없이)
          </button>
        </div>
      `;
      UI.refreshIcons();
      _bindEvents();
      _checkFirstUse();
    }

    async function _checkFirstUse() {
      const pinHash = await DB.getSetting('pinHash');
      if (!pinHash) {
        document.getElementById('setup-hint').classList.remove('hidden');
      }
    }

    function _bindEvents() {
      document.querySelectorAll('[data-num]').forEach(btn => {
        btn.addEventListener('click', () => _addDigit(btn.dataset.num));
      });
      document.getElementById('pin-del').addEventListener('click', _deleteDigit);
      document.getElementById('pin-bio').addEventListener('click', _tryBiometric);
    }

    function _addDigit(num) {
      if (lockoutEnd > Date.now()) return;
      if (pin.length >= 6) return;
      pin += num;
      _updateDots();
      if (pin.length === 6) {
        setTimeout(_verifyPin, 200);
      }
    }

    function _deleteDigit() {
      pin = pin.slice(0, -1);
      _updateDots();
    }

    function _updateDots() {
      const dots = document.querySelectorAll('.pin-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('filled', i < pin.length);
      });
    }

    async function _verifyPin() {
      const storedHash = await DB.getSetting('pinHash');
      const inputHash = await CryptoUtil.hashPin(pin);

      if (!storedHash) {
        // First-time setup
        await DB.setSetting('pinHash', inputHash);
        AppState.set('pin', pin);
        AppState.set('isLocked', false);
        UI.toast('PIN이 설정되었습니다!', 'success');
        App.navigate('home');
        return;
      }

      if (inputHash === storedHash) {
        attempts = 0;
        AppState.set('pin', pin);
        AppState.set('isLocked', false);
        App.navigate('home');
      } else {
        attempts++;
        pin = '';
        _updateDots();
        _shakeAnimation();
        if (attempts >= MAX_ATTEMPTS) {
          _startLockout();
        } else {
          UI.toast(`잘못된 PIN (${attempts}/${MAX_ATTEMPTS})`, 'error');
        }
      }
    }

    function _shakeAnimation() {
      const dots = document.getElementById('pin-dots');
      if (dots) {
        dots.style.animation = 'none';
        dots.offsetHeight;
        dots.style.animation = 'shake 0.4s ease';
      }
    }

    function _startLockout() {
      lockoutEnd = Date.now() + LOCKOUT_SECONDS * 1000;
      const msg = document.getElementById('lockout-msg');
      msg.classList.remove('hidden');
      lockoutTimer = setInterval(() => {
        const remaining = Math.ceil((lockoutEnd - Date.now()) / 1000);
        if (remaining <= 0) {
          clearInterval(lockoutTimer);
          msg.classList.add('hidden');
          attempts = 0;
        } else {
          msg.textContent = `${remaining}초 후 다시 시도해주세요`;
        }
      }, 1000);
    }

   async function _tryBiometric() {
  if (!window.PublicKeyCredential) {
    UI.toast('이 기기에서는 생체인증을 지원하지 않습니다', 'error');
    return;
  }
  // ① 저장된 지문 ID 확인
  const savedId = localStorage.getItem('mv_biometric_id');
  if (!savedId) {
    UI.toast('설정 → 보안에서 지문을 먼저 등록하세요', 'info');
    return;
  }
  try {
    // ② Base64 → Uint8Array 변환
    const rawId = Uint8Array.from(atob(savedId), c => c.charCodeAt(0));
    // ③ 안드로이드 지문인식 팝업 호출 (allowCredentials 핵심!)
    const credential = await navigator.credentials.get({
      publicKey: {
        challenge: window.crypto.getRandomValues(new Uint8Array(32)),
        timeout: 60000,
        userVerification: 'required',
        rpId: location.hostname || 'localhost',
        allowCredentials: [{          // ← 이게 없으면 지문을 못 찾음
          id: rawId,
          type: 'public-key',
          transports: ['internal']   // internal = 기기 내장 센서만
        }]
      }
    });
    if (credential) {
      const storedPin = await DB.getSetting('bioPin');
      if (storedPin) {
        AppState.set('pin', storedPin);
        AppState.set('isLocked', false);
        UI.toast('✅ 지문 인증 성공!', 'success');
        App.navigate('home');
      } else {
        UI.toast('PIN으로 한 번 로그인 후 설정에서 지문을 다시 등록하세요', 'info');
      }
    }
  } catch (e) {
    if (e.name === 'NotAllowedError') {
      UI.toast('지문 인증이 취소되었습니다', 'error');
    } else if (e.name === 'SecurityError') {
      UI.toast('HTTPS 환경에서만 지문인식이 작동합니다', 'error');
    } else {
      UI.toast('생체인증 실패 — PIN으로 입력하세요', 'error');
    }
  }
}

   async function quickRecord() {
      // PIN 없이 즉시 녹음 시작 → 임시 저장 → 나중에 PIN으로 확인 후 저장
      let qMediaRecorder = null;
      let qChunks = [];
      let qSeconds = 0;
      let qTimer = null;

      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;';
      overlay.innerHTML = `
        <p style="color:#475569;font-size:12px;letter-spacing:2px">⚡ 빠른 녹음</p>
        <div id="qrec-timer" style="font-size:64px;font-weight:700;color:#f1f5f9;font-variant-numeric:tabular-nums">00:00</div>
        <button id="qrec-stop" style="
          width:140px;height:140px;border-radius:50%;background:#ef4444;
          border:none;color:white;font-size:40px;cursor:pointer;
          animation:dRecording 1s infinite;
        ">⏹</button>
        <p style="color:#475569;font-size:12px">탭하면 중지 후 저장</p>
        <style>@keyframes dRecording{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.7)}50%{box-shadow:0 0 0 32px rgba(239,68,68,0)}}</style>
      `;
      document.body.appendChild(overlay);

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        qMediaRecorder = new MediaRecorder(stream);
        qChunks = [];
        qMediaRecorder.ondataavailable = e => qChunks.push(e.data);
        qMediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          overlay.remove();
          const blob = new Blob(qChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onload = async () => {
            // 임시 저장 (PIN 없이 빠른 저장)
            const title = `빠른녹음_${new Date().toLocaleTimeString('ko-KR')}`;
            await DB.addMemory({
              title, type: 'voice', content: '🎤 빠른 녹음 (텍스트 변환 필요)',
              audioData: reader.result, tags: ['빠른녹음'], priority: 'medium',
              folderId: null, encrypted: false
            });
            UI.toast('✅ 빠른 녹음 저장됨! PIN으로 로그인하면 확인하세요', 'success');
          };
          reader.readAsDataURL(blob);
        };
        qMediaRecorder.start();
        qSeconds = 0;
        const timerEl = overlay.querySelector('#qrec-timer');
        qTimer = setInterval(() => {
          qSeconds++;
          timerEl.textContent = String(Math.floor(qSeconds/60)).padStart(2,'0') + ':' + String(qSeconds%60).padStart(2,'0');
        }, 1000);

        overlay.querySelector('#qrec-stop').addEventListener('click', () => {
          clearInterval(qTimer);
          qMediaRecorder.stop();
        });
      } catch(e) {
        overlay.remove();
        UI.toast('마이크 권한이 필요합니다', 'error');
      }
    }

    return { show, quickRecord };
  })();
  </script>

            <h3 class="text-sm font-semibold text-slate-400 mb-2">최근 기억</h3>
            <div id="memory-list">
              ${recent.length ? recent.map(m => _renderMemoryCard(m)).join('') : `
                <div class="empty-state">
                  <div class="text-4xl mb-4">📭</div>
                  <p class="text-slate-500">아직 저장된 기억이 없습니다</p>
                  <p class="text-slate-600 text-xs mt-1">위의 버튼으로 첫 번째 기억을 추가하세요</p>
                </div>
              `}
            </div>
          </div>

          ${_renderTabBar('home')}
        </div>
      `;
      UI.refreshIcons();
      _bindSearch();
      _bindLongPress();
    }

    function _renderMemoryCard(m) {
      const typeIcons = { text: 'file-text', image: 'image', document: 'file', voice: 'mic' };
      const typeColors = { text: 'text-blue-400', image: 'text-green-400', document: 'text-orange-400', voice: 'text-red-400' };
      const priorityClass = m.priority === 'high' ? 'priority-high' : m.priority === 'medium' ? 'priority-medium' : 'priority-low';
      const isSelected = ContextMenu.getSelectedIds().has(m.id);
      const folder = m.folderId ? _folderMap[m.folderId] : null;
      const folderBadgeHtml = folder ? `<span class="folder-badge">📁 ${_escapeHtml(folder.name)}</span>` : '';
      return `
        <div class="card mb-2 cursor-pointer ${isSelected ? 'selected-card' : ''}" data-memory-id="${m.id}">
          <div class="flex items-start gap-3">
            <i data-lucide="${typeIcons[m.type] || 'file'}" class="w-5 h-5 mt-0.5 ${typeColors[m.type] || ''}"></i>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1 flex-wrap">
                <span class="font-medium text-sm truncate">${_escapeHtml(m.title || '제목 없음')}</span>
                ${m.priority ? `<span class="priority-badge ${priorityClass}">${m.priority === 'high' ? '높음' : m.priority === 'medium' ? '보통' : '낮음'}</span>` : ''}
                ${folderBadgeHtml}
              </div>
              <p class="text-xs text-slate-400 truncate">${_escapeHtml((m.content || '').substring(0, 80))}</p>
              <div class="flex items-center gap-2 mt-1 flex-wrap">
                <span class="text-xs text-slate-500">${UI.formatDate(m.createdAt)}</span>
                ${m.tags && m.tags.length ? m.tags.slice(0, 3).map(t => `<span class="tag">${_escapeHtml(t)}</span>`).join('') : ''}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function _bindLongPress() {
      document.querySelectorAll('[data-memory-id]').forEach(card => {
        const id = parseInt(card.dataset.memoryId);
        ContextMenu.bindLongPress(card, id);
        card.addEventListener('click', (e) => {
          // If context menu is active, do nothing
          if (ContextMenu.isActive()) { e.preventDefault(); e.stopPropagation(); return; }
          // If in selection mode, toggle selection
          if (ContextMenu.isSelectionMode()) { ContextMenu.toggleSelection(id); return; }
          // Normal click - navigate to view
          App.navigate('viewMemory', { id });
        });
      });
    }

    function _bindSearch() {
      const input = document.getElementById('search-input');
      if (!input) return;
      input.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
          const q = e.target.value.trim();
          AppState.set('searchQuery', q);
          const results = q ? await DB.searchMemories(q) : await DB.getAllMemories();
          const list = document.getElementById('memory-list');
          if (list) {
            list.innerHTML = results.length ? results.slice(0, 20).map(m => _renderMemoryCard(m)).join('') : `
              <div class="empty-state">
                <div class="text-4xl mb-4">🔍</div>
                <p class="text-slate-500">검색 결과가 없습니다</p>
              </div>
            `;
            UI.refreshIcons();
            _bindLongPress();
          }
        }, 300);
      });
    }

    return { show, _renderMemoryCard, getFolderMap, _loadFolderMap };
  })();

  function _escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function _renderTabBar(active) {
    const tabs = [
      { id: 'home', icon: 'home', label: '홈' },
      { id: 'folders', icon: 'folder', label: '폴더' },
      { id: 'addMemory', icon: 'plus-circle', label: '추가', params: "{type:'text'}" },
      { id: 'allMemories', icon: 'grid', label: '전체' },
      { id: 'settings', icon: 'settings', label: '설정' }
    ];
    return `
      <div class="tab-bar">
        ${tabs.map(t => `
          <div class="tab-item ${active === t.id ? 'active' : ''}" onclick="App.navigate('${t.id}'${t.params ? ', ' + t.params : ''})">
            <i data-lucide="${t.icon}" class="w-5 h-5"></i>
            <span>${t.label}</span>
          </div>
        `).join('')}
      </div>
    `;
  }
  </script>

  <!-- ==================== FORM: TEXT ==================== -->
  <script>
  /**
   * TextForm - Text memory creation/editing
   */
  window.TextForm = (() => {
    async function show(params = {}) {
      AppState.set('currentScreen', 'addMemory');
      const editing = params.id ? await DB.getMemory(params.id) : null;
      const folders = await DB.getAllFolders();

      const app = document.getElementById('app');
      app.innerHTML = `
        ${NavBar.render(editing ? '텍스트 수정' : '텍스트 기억 추가')}
        <div class="p-4 pb-24 nav-content-offset fade-in">
          <div class="space-y-4">
            <div>
              <label class="text-sm text-slate-400 mb-1 block">제목 *</label>
              <input type="text" id="mem-title" placeholder="기억의 제목" value="${_escapeHtml(editing?.title || '')}"/>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">내용 *</label>
              <textarea id="mem-content" rows="6" placeholder="기억할 내용을 입력하세요...">${_escapeHtml(editing?.content || '')}</textarea>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">폴더</label>
              <select id="mem-folder">
                <option value="">폴더 없음</option>
                ${folders.map(f => `<option value="${f.id}" ${editing?.folderId === f.id ? 'selected' : ''}>${_escapeHtml(f.name)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">우선순위</label>
              <select id="mem-priority">
                <option value="low" ${editing?.priority === 'low' ? 'selected' : ''}>낮음</option>
                <option value="medium" ${(!editing || editing?.priority === 'medium') ? 'selected' : ''}>보통</option>
                <option value="high" ${editing?.priority === 'high' ? 'selected' : ''}>높음</option>
              </select>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">태그 (쉼표로 구분)</label>
              <input type="text" id="mem-tags" placeholder="태그1, 태그2" value="${editing?.tags ? editing.tags.join(', ') : ''}"/>
            </div>
            <div class="flex gap-3 mt-4">
              <button id="btn-ai-tag" class="btn btn-secondary flex-1 flex items-center justify-center gap-2">
                <i data-lucide="sparkles" class="w-4 h-4"></i> AI 태그
              </button>
              <button id="btn-save" class="btn btn-primary flex-1">${editing ? '수정' : '저장'}</button>
            </div>
          </div>
        </div>
      `;
      UI.refreshIcons();

      document.getElementById('btn-save').addEventListener('click', () => _save(editing?.id));
      document.getElementById('btn-ai-tag').addEventListener('click', _aiTag);
    }

    async function _save(editId) {
      const title = document.getElementById('mem-title').value.trim();
      const content = document.getElementById('mem-content').value.trim();
      if (!title || !content) { UI.toast('제목과 내용을 입력하세요', 'error'); return; }

      const folderId = document.getElementById('mem-folder').value ? parseInt(document.getElementById('mem-folder').value) : null;
      const priority = document.getElementById('mem-priority').value;
      const tags = document.getElementById('mem-tags').value.split(',').map(t => t.trim()).filter(Boolean);

      const pin = AppState.get('pin');
      let finalContent = content;
      if (AppState.get('encryptionEnabled') && pin) {
        finalContent = await CryptoUtil.encrypt(content, pin);
      }

      const memory = { title, content: finalContent, type: 'text', folderId, priority, tags, encrypted: AppState.get('encryptionEnabled') };

      try {
        if (editId) {
          await DB.updateMemory(editId, memory);
          UI.toast('기억이 수정되었습니다', 'success');
        } else {
          await DB.addMemory(memory);
          UI.toast('기억이 저장되었습니다', 'success');
        }
        App.navigate('home');
      } catch (e) {
        UI.toast('저장 실패: ' + e.message, 'error');
      }
    }

    async function _aiTag() {
      const content = document.getElementById('mem-content').value.trim();
      if (!content) { UI.toast('먼저 내용을 입력하세요', 'info'); return; }
      try {
        UI.showLoading('AI가 태그를 생성 중...');
        const result = await AbacusAI.callLLM(
          `다음 텍스트에서 관련 태그 5개를 한국어로 추출하세요. 쉼표로 구분하여 태그만 출력하세요:\n\n${content}`,
          '당신은 텍스트 분석 전문가입니다. 태그만 출력하세요.'
        );
        UI.hideLoading();
        if (result) {
          document.getElementById('mem-tags').value = result;
          UI.toast('AI 태그가 생성되었습니다', 'success');
        }
      } catch (e) {
        UI.hideLoading();
        UI.toast('AI 태그 생성 실패', 'error');
      }
    }

    return { show };
  })();
  </script>

  <!-- ==================== FORM: IMAGE ==================== -->
  <script>
  /**
   * ImageForm - Image memory with drag-and-drop, Base64 storage
   */
  window.ImageForm = (() => {
    let imageDataList = []; // Support multiple images
    let editId = null;

    async function show(params = {}) {
      AppState.set('currentScreen', 'addMemory');
      editId = params.id || null;
      imageDataList = [];
      const editing = editId ? await DB.getMemory(editId) : null;
      const folders = await DB.getAllFolders();

      // Load existing images if editing
      if (editing && editing.imageData) {
        if (Array.isArray(editing.imageData)) imageDataList = [...editing.imageData];
        else imageDataList = [editing.imageData];
      }

      const app = document.getElementById('app');
      app.innerHTML = `
        ${NavBar.render(editing ? '이미지 수정' : '이미지 기억 추가')}
        <div class="p-4 pb-24 nav-content-offset fade-in">
          <div class="space-y-4">
            <div>
              <label class="text-sm text-slate-400 mb-1 block">제목 *</label>
              <input type="text" id="mem-title" placeholder="이미지 제목" value="${_escapeHtml(editing?.title || '')}"/>
            </div>
            <div id="images-preview-list"></div>
            <div id="drop-zone" class="drag-zone">
              <i data-lucide="image-plus" class="w-12 h-12 mx-auto mb-3 text-slate-500"></i>
              <p class="text-slate-400">이미지를 드래그하거나 클릭하여 업로드</p>
              <p class="text-slate-500 text-xs mt-1">JPG, PNG, GIF, WebP (최대 10MB) · 여러 장 추가 가능</p>
              <input type="file" id="file-input" accept="image/*" multiple class="hidden"/>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">설명</label>
              <textarea id="mem-content" rows="3" placeholder="이미지에 대한 설명...">${_escapeHtml(editing?.content || '')}</textarea>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">폴더</label>
              <select id="mem-folder">
                <option value="">폴더 없음</option>
                ${folders.map(f => `<option value="${f.id}" ${editing?.folderId === f.id ? 'selected' : ''}>${_escapeHtml(f.name)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">우선순위</label>
              <select id="mem-priority">
                <option value="low" ${editing?.priority === 'low' ? 'selected' : ''}>낮음</option>
                <option value="medium" ${(!editing || editing?.priority === 'medium') ? 'selected' : ''}>보통</option>
                <option value="high" ${editing?.priority === 'high' ? 'selected' : ''}>높음</option>
              </select>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">태그 (쉼표로 구분)</label>
              <input type="text" id="mem-tags" placeholder="태그1, 태그2" value="${editing?.tags ? editing.tags.join(', ') : ''}"/>
            </div>
            <div class="flex gap-3">
              <button id="btn-ai-desc" class="btn btn-secondary flex-1 flex items-center justify-center gap-2">
                <i data-lucide="sparkles" class="w-4 h-4"></i> AI 분석
              </button>
              <button id="btn-save" class="btn btn-primary flex-1">${editing ? '수정' : '저장'}</button>
            </div>
          </div>
        </div>
      `;
      UI.refreshIcons();
      _renderImagesList();
      _bindEvents();
    }

    function _renderImagesList() {
      const container = document.getElementById('images-preview-list');
      if (!container) return;
      if (imageDataList.length === 0) { container.innerHTML = ''; return; }
      container.innerHTML = imageDataList.map((img, i) => `
        <div class="file-list-item">
          <img src="${img}" style="width:48px;height:48px;object-fit:cover;border-radius:8px"/>
          <span class="flex-1 text-sm text-slate-300">이미지 ${i + 1}</span>
          <span class="remove-file" onclick="ImageForm.removeImage(${i})">✕</span>
        </div>
      `).join('');
    }

    function removeImage(index) {
      imageDataList.splice(index, 1);
      _renderImagesList();
    }

    function _bindEvents() {
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');

      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        Array.from(e.dataTransfer.files).forEach(f => _handleFile(f));
      });
      fileInput.addEventListener('change', (e) => {
        Array.from(e.target.files).forEach(f => _handleFile(f));
        e.target.value = '';
      });
      document.getElementById('btn-save').addEventListener('click', _save);
      document.getElementById('btn-ai-desc').addEventListener('click', _aiAnalyze);
    }

    function _handleFile(file) {
      if (file.size > 10 * 1024 * 1024) { UI.toast('10MB 이하의 이미지를 선택하세요', 'error'); return; }
      if (!file.type.startsWith('image/')) { UI.toast('이미지 파일만 업로드 가능합니다', 'error'); return; }
      const reader = new FileReader();
      reader.onload = (e) => {
        imageDataList.push(e.target.result);
        _renderImagesList();
        if (!document.getElementById('mem-title').value) {
          document.getElementById('mem-title').value = file.name.replace(/\.[^/.]+$/, '');
        }
      };
      reader.readAsDataURL(file);
    }

    async function _save() {
      const title = document.getElementById('mem-title').value.trim();
      if (!title) { UI.toast('제목을 입력하세요', 'error'); return; }
      if (imageDataList.length === 0) { UI.toast('이미지를 선택하세요', 'error'); return; }
      const content = document.getElementById('mem-content').value.trim();
      const folderId = document.getElementById('mem-folder').value ? parseInt(document.getElementById('mem-folder').value) : null;
      const priority = document.getElementById('mem-priority').value;
      const tags = document.getElementById('mem-tags').value.split(',').map(t => t.trim()).filter(Boolean);

      // Store as array if multiple, single value if one (backward compat)
      const imgStore = imageDataList.length === 1 ? imageDataList[0] : [...imageDataList];

      try {
        if (editId) {
          await DB.updateMemory(editId, { title, content, imageData: imgStore, folderId, priority, tags });
          UI.toast('이미지가 수정되었습니다', 'success');
        } else {
          await DB.addMemory({ title, content, type: 'image', imageData: imgStore, folderId, priority, tags, encrypted: false });
          UI.toast('이미지가 저장되었습니다', 'success');
        }
        App.navigate('home');
      } catch (e) {
        UI.toast('저장 실패: ' + e.message, 'error');
      }
    }

    async function _aiAnalyze() {
      const img = imageDataList[0];
      if (!img) { UI.toast('먼저 이미지를 업로드하세요', 'info'); return; }
      try {
        UI.showLoading('AI가 이미지를 분석 중...');
        const result = await AbacusAI.analyzeImage(img);
        UI.hideLoading();
        if (result) {
          document.getElementById('mem-content').value = result;
          UI.toast('AI 분석 완료', 'success');
        }
      } catch (e) {
        UI.hideLoading();
        UI.toast('AI 분석 실패', 'error');
      }
    }

    return { show, removeImage };
  })();
  </script>

              <input type="file" id="file-input" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" multiple class="hidden"/>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">메모</label>
              <textarea id="mem-content" rows="3" placeholder="문서에 대한 메모...">${_escapeHtml(editing?.content || '')}</textarea>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">폴더</label>
              <select id="mem-folder">
                <option value="">폴더 없음</option>
                ${folders.map(f => `<option value="${f.id}" ${editing?.folderId === f.id ? 'selected' : ''}>${_escapeHtml(f.name)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">우선순위</label>
              <select id="mem-priority">
                <option value="low" ${editing?.priority === 'low' ? 'selected' : ''}>낮음</option>
                <option value="medium" ${(!editing || editing?.priority === 'medium') ? 'selected' : ''}>보통</option>
                <option value="high" ${editing?.priority === 'high' ? 'selected' : ''}>높음</option>
              </select>
            </div>
            <div>
              <label class="text-sm text-slate-400 mb-1 block">태그 (쉼표로 구분)</label>

    function _renderDocList() {
      const container = document.getElementById('doc-list-area');
      if (!container) return;
      if (docList.length === 0) { container.innerHTML = ''; return; }
      container.innerHTML = docList.map((doc, i) => `
        <div class="file-list-item">
          <span style="font-size:20px">📄</span>
          <span class="flex-1 text-sm text-slate-300 truncate">${_escapeHtml(doc.name)}</span>
          <span class="remove-file" onclick="DocumentForm.removeDoc(${i})">✕</span>

    function _handleFile(file) {
      if (file.size > 20 * 1024 * 1024) { UI.toast('20MB 이하의 문서를 선택하세요', 'error'); return; }
      const validTypes = ['application/pdf', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
      if (!validTypes.includes(file.type) && !file.name.match(/\.(pdf|docx)$/i)) {
        UI.toast('PDF 또는 DOCX 파일만 지원합니다', 'error'); return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        docList.push({ data: e.target.result, name: file.name });
        _renderDocList();
        if (!document.getElementById('mem-title').value) {
          document.getElementById('mem-title').value = file.name.replace(/\.[^/.]+$/, '');
        }
      };
      reader.readAsDataURL(file);
    }

    async function _save() {
      const title = document.getElementById('mem-title').value.trim();
      if (!title) { UI.toast('제목을 입력하세요', 'error'); return; }
      if (docList.length === 0) { UI.toast('문서를 선택하세요', 'error'); return; }
      const content = document.getElementById('mem-content').value.trim();
      const folderId = document.getElementById('mem-folder').value ? parseInt(document.getElementById('mem-folder').value) : null;
      const priority = document.getElementById('mem-priority').value;
      const tags = document.getElementById('mem-tags').value.split(',').map(t => t.trim()).filter(Boolean);

      // Backward compat: single doc uses docData/docName, multi uses docDataList
      const memData = { title, content, type: 'document', folderId, priority, tags, encrypted: false };
      if (docList.length === 1) {
        memData.docData = docList[0].data;
        memData.docName = docList[0].name;
        memData.docDataList = docList;
      } else {
        memData.docData = docList[0].data;
        memData.docName = docList[0].name;
        memData.docDataList = [...docList];
      }

      try {
        if (editId) {
          await DB.updateMemory(editId, memData);
          UI.toast('문서가 수정되었습니다', 'success');
        } else {
          await DB.addMemory(memData);
          UI.toast('문서가 저장되었습니다', 'success');
        }
        App.navigate('home');
      } catch (e) {
        UI.toast('저장 실패: ' + e.message, 'error');
      }
    }

    return { show, removeDoc };
  })();
  </script>

// ✅ 삼성 녹음파일 업로드 처리
document.getElementById('audio-file-input').addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(file => {
    if (file.size > 100 * 1024 * 1024) {
      UI.toast('100MB 이하 파일만 가능합니다', 'error'); return;

    const reader = new FileReader();
    reader.onload = (ev) => {

  });
}
    function _renderAudioList() {
      const container = document.getElementById('audio-list-area');
      if (!container) return;
      if (audioDataList.length === 0) { container.innerHTML = ''; return; }
      container.innerHTML = audioDataList.map((aud, i) => `
        <div class="file-list-item">
          <span style="font-size:20px">🎤</span>
          <audio src="${aud}" controls style="flex:1;height:32px"></audio>
          <span class="remove-file" onclick="VoiceForm.removeAudio(${i})">✕</span>
        </div>
      `).join('');
    }

    function removeAudio(index) {
      audioDataList.splice(index, 1);
      _renderAudioList();
    }

// ══ 1번+2번: 백그라운드 생존 시스템 ══
    async function _acquireWakeLock() {
      // 2번: 화면 꺼짐 차단
      if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
      }
      // 1번: 무음 오디오 → OS가 "음악 앱 실행 중"으로 인식 → 탭 생존
      try {
        const SILENT = 'data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIADAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV6urq6urq6urq6urq6urq6urq6urq6urq6v////////////////////////////////8AAAAATGF2YzU4LjU0AAAAAAAAAAAAAAAAJAAAAAAAAAAAASDs90hvAAAAAAAAAAAAAAAAAAAA//MUZAAAAAGkAAAAAAAAA0gAAAAATEFN//MUZAMAAAGkAAAAAAAAA0gAAAAARTMu//MUZAYAAAGkAAAAAAAAA0gAAAAAOTku//MUZAkAAAGkAAAAAAAAA0gAAAAANVVV';
        silentAudio = new Audio(SILENT);
        silentAudio.loop = true;
        silentAudio.volume = 0.001;
        await silentAudio.play();
      } catch(e) {}
    }

    function _releaseWakeLock() {
      if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
      if (silentAudio) { silentAudio.pause(); silentAudio.src = ''; silentAudio = null; }
    }

    async function _onVisibilityChange() {
      if (document.visibilityState === 'visible' && isRecording) await _acquireWakeLock();
    }

    // ══ 3번: AI 액션 아이템 자동 추출 ══
    async function _extractActionItems(text) {
      if (!text || !AppState.get('geminiApiKey')) return;
      try {
        const result = await AbacusAI.callLLM(
          `다음 텍스트에서 할 일, 연락, 일정, 확인 사항 등 액션 아이템만 추출해서 번호 목록으로 출력하세요. 없으면 "없음"이라고만 하세요:\n\n${text}`,
          '당신은 비서입니다. 액션 아이템 번호 목록만 출력하세요. 다른 말은 하지 마세요.'
        );
        if (!result || result.trim() === '없음') return;
        const el = document.getElementById('ai-actions');
        if (el) {
          el.innerHTML = `
            <p style="font-size:12px;color:#a5b4fc;font-weight:600;margin-bottom:6px">✅ AI 액션 아이템 자동 추출</p>
            <p style="font-size:13px;color:#e2e8f0;white-space:pre-wrap;line-height:1.6">${_escapeHtml(result.trim())}</p>
          `;
          el.classList.remove('hidden');
        }
      } catch(e) {}
    }

    async function _toggleRecording() {
      if (isRecording) {
        _stopRecording();
      } else {
        _startRecording();
      }
    }

    async function _startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64;
        source.connect(analyser);

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
        audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const url = URL.createObjectURL(audioBlob);
        document.getElementById('audio-el').src = url;
        document.getElementById('audio-player').classList.remove('hidden');

        // 오디오 데이터 저장
        const reader = new FileReader();
        reader.onload = () => {
          audioDataList.push(reader.result);
          _renderAudioList();
        };
        reader.readAsDataURL(audioBlob);
        stream.getTracks().forEach(t => t.stop());

        // ✅ Groq Whisper API로 음성 → 텍스트 변환
        const groqKey = AppState.get('groqApiKey');
        const statusEl = document.getElementById('rec-status');
        const transcriptEl = document.getElementById('mem-transcript');

        if (groqKey) {
          if (statusEl) statusEl.textContent = '🤖 AI가 음성을 텍스트로 변환 중...';
          try {
            const text = await AbacusAI.transcribeAudio(audioBlob);
            if (text && text.trim()) {
              if (transcriptEl) transcriptEl.value = text.trim();
             if (statusEl) statusEl.textContent = '✅ 변환 완료!';
              UI.toast('음성이 텍스트로 변환되었어요!', 'success');
              _extractActionItems(text.trim());
            } else {
              if (statusEl) statusEl.textContent = '⚠️ 변환 결과 없음 (직접 입력해주세요)';
            }
          } catch(e) {
            if (statusEl) statusEl.textContent = '❌ 변환 실패 - 직접 입력해주세요';
            UI.toast('Groq API 오류: ' + e.message, 'error');
          }
        } else {
          if (statusEl) statusEl.textContent = '⚠️ Groq API 키 없음 - 설정에서 등록해주세요';
          // Web Speech API 결과가 있으면 유지
          const existing = transcriptEl ? transcriptEl.value : '';
          if (!existing) {
            UI.toast('설정 → Groq API 키를 등록하면 자동 변환돼요', 'info');
          }
        }
      };
        mediaRecorder.start();
        isRecording = true;
        await _acquireWakeLock();
        document.addEventListener('visibilitychange', _onVisibilityChange);

        document.getElementById('rec-status').textContent = '🔴 녹음 중 (화면잠금 방지됨)';
        document.getElementById('btn-rec').style.background = '#dc2626';
        _animateVisualizer();
        const dimBtn = document.getElementById('btn-dim');
        if (dimBtn) dimBtn.classList.remove('hidden');
        _startSpeechRecognition();
      } catch (e) {
        UI.toast('마이크 접근 권한이 필요합니다', 'error');
      }
    }

    function _stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      if (recognition) {
        try { recognition.stop(); } catch(e) {}
      }
      isRecording = false;
      cancelAnimationFrame(animationId);
      _releaseWakeLock();
      document.removeEventListener('visibilitychange', _onVisibilityChange);
      document.getElementById('rec-status').textContent = '✅ 녹음 완료 — 변환 중...';
      document.getElementById('btn-rec').style.background = '#ef4444';
      document.querySelectorAll('.voice-bar').forEach(b => b.style.height = '4px');
      const dimBtn = document.getElementById('btn-dim');
      if (dimBtn) dimBtn.classList.add('hidden');
      if (dimOverlay) { dimOverlay.remove(); dimOverlay = null; }
    }

    function _animateVisualizer() {
      if (!isRecording || !analyser) return;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const bars = document.querySelectorAll('.voice-bar');
      bars.forEach((bar, i) => {
        const val = data[i] || 0;
        bar.style.height = Math.max(4, val / 4) + 'px';
      });
      animationId = requestAnimationFrame(_animateVisualizer);
    }

    function _startSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;
      recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.onresult = (e) => {
        let final = '', interim = '';
        for (let i = 0; i < e.results.length; i++) {
          if (e.results[i].isFinal) final += e.results[i][0].transcript;
          else interim += e.results[i][0].transcript;
        }
        transcript = final;
        document.getElementById('mem-transcript').value = final + (interim ? ' ' + interim : '');
      };
      recognition.onerror = () => {};
      recognition.start();
    }

    async function _save() {
      const title = document.getElementById('mem-title').value.trim();
      if (!title) { UI.toast('제목을 입력하세요', 'error'); return; }
      const transcriptText = document.getElementById('mem-transcript').value.trim();
      const folderId = document.getElementById('mem-folder').value ? parseInt(document.getElementById('mem-folder').value) : null;
      const priority = document.getElementById('mem-priority').value;
      const tags = document.getElementById('mem-tags').value.split(',').map(t => t.trim()).filter(Boolean);

      // Store as single or array
      const audioStore = audioDataList.length === 1 ? audioDataList[0] : (audioDataList.length > 0 ? [...audioDataList] : null);

      try {
        if (editId) {
          await DB.updateMemory(editId, { title, content: transcriptText, audioData: audioStore, folderId, priority, tags });
          UI.toast('음성이 수정되었습니다', 'success');
        } else {
          await DB.addMemory({ title, content: transcriptText, type: 'voice', audioData: audioStore, folderId, priority, tags, encrypted: false });
          UI.toast('음성이 저장되었습니다', 'success');
        }
        App.navigate('home');
      } catch (e) {
        UI.toast('저장 실패: ' + e.message, 'error');
      }
    }

// ══ 운전모드 UI ══
    let driveModeOverlay = null;
    let driveTimerInterval = null;

function showDriveMode() {
      if (driveModeOverlay) return;
      driveModeOverlay = document.createElement('div');
      driveModeOverlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;';
      driveModeOverlay.innerHTML = `
        <p style="color:#475569;font-size:12px;letter-spacing:3px;text-transform:uppercase">🚗 운전모드</p>
        <div id="drive-timer" style="font-size:72px;font-weight:700;color:#f1f5f9;font-variant-numeric:tabular-nums;letter-spacing:-2px">00:00</div>
        <button id="drive-btn" style="
          width:160px;height:160px;border-radius:50%;
          background:#ef4444;border:none;cursor:pointer;
          display:flex;flex-direction:column;align-items:center;
          justify-content:center;gap:8px;color:white;
          animation:dPulse 2s infinite;
        ">
          <span style="font-size:48px">🎤</span>
          <span id="drive-label" style="font-size:13px;font-weight:600">탭하여 녹음 시작</span>
        </button>
        <p id="drive-hint" style="color:#334155;font-size:12px;text-align:center;line-height:1.8">
          중지 후 자동 텍스트 변환 · AI 액션 아이템 추출
        </p>
        <button id="drive-exit" style="
          position:absolute;top:16px;right:16px;
          background:none;border:none;color:#475569;
          font-size:28px;cursor:pointer;padding:8px;
        ">✕</button>
        <style>
          @keyframes dPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 24px rgba(239,68,68,0)}}
          @keyframes dRecording{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.7)}50%{box-shadow:0 0 0 36px rgba(220,38,38,0)}}
        </style>
      `;
      document.body.appendChild(driveModeOverlay);

      // ✅ 핵심: 운전모드 전용 상태 변수 (공유 isRecording 안씀)
      let driveRecording = false;
      let driveLocked = false;     // 중지 후 재클릭 방지 잠금
      let secs = 0;

      const timerEl = driveModeOverlay.querySelector('#drive-timer');
      const btn = driveModeOverlay.querySelector('#drive-btn');
      const label = driveModeOverlay.querySelector('#drive-label');
      const hintEl = driveModeOverlay.querySelector('#drive-hint');
      const exit = driveModeOverlay.querySelector('#drive-exit');

      btn.addEventListener('click', async () => {
        // ✅ 잠금 중이면 클릭 무시 (중지 후 중복 방지)
        if (driveLocked) return;

        if (!driveRecording) {
          // ── 녹음 시작 ──
          driveRecording = true;
          label.textContent = '탭하여 중지';
          btn.style.background = '#dc2626';
          btn.style.animation = 'dRecording 1s infinite';
          hintEl.textContent = '🔴 녹음 중... 탭하면 중지됩니다';
          secs = 0;
          driveTimerInterval = setInterval(() => {
            secs++;
            timerEl.textContent =
              String(Math.floor(secs / 60)).padStart(2, '0') + ':' +
              String(secs % 60).padStart(2, '0');
          }, 1000);
          await _startRecording();

        } else {
          // ── 녹음 중지 ──
          driveRecording = false;
          driveLocked = true;        // ✅ 잠금 → 재클릭 방지
          clearInterval(driveTimerInterval);

          // 버튼 UI → 변환 중 상태
          btn.style.background = '#6366f1';
          btn.style.animation = 'none';
          btn.style.cursor = 'default';
          label.textContent = '🤖 변환 중...';
          hintEl.textContent = 'AI가 텍스트로 변환하고 있어요';

          // ✅ 운전모드 전용 자동저장 파이프라인
          // mediaRecorder 강제 종료 후 onstop 대신 직접 처리
          if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
          }
          if (recognition) { try { recognition.stop(); } catch(e) {} }
          isRecording = false;
          cancelAnimationFrame(animationId);
          _releaseWakeLock();
          document.removeEventListener('visibilitychange', _onVisibilityChange);
          document.querySelectorAll('.voice-bar').forEach(b => b.style.height = '4px');

          // onstop 완료 대기 후 자동저장 실행
          const waitStop = setInterval(async () => {
            if (!audioChunks || audioChunks.length === 0) return;
            clearInterval(waitStop);

            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            audioChunks = [];

            // ── Step 1: Groq 음성→텍스트 변환 ──
            hintEl.textContent = '🎙️ Step 1/3 — 음성 텍스트 변환 중...';
            let transcriptText = '';
            const groqKey = AppState.get('groqApiKey');
            if (groqKey) {
              try {
                transcriptText = await AbacusAI.transcribeAudio(blob) || '';
              } catch(e) {
                transcriptText = '';
              }
            }

            // ── Step 2: Gemini 제목 자동 생성 ──
            hintEl.textContent = '🤖 Step 2/3 — AI 제목 생성 중...';
            let autoTitle = '';
            const geminiKey = AppState.get('geminiApiKey');
            if (geminiKey && transcriptText) {
              try {
                const titleResult = await AbacusAI.callLLM(
                  `다음 음성 메모 내용을 보고 제목을 10자 이내로 만들어주세요. 제목만 출력하세요:\n\n${transcriptText}`,
                  '제목만 출력하세요. 다른 말은 하지 마세요.'
                );
                autoTitle = (titleResult || '').trim().replace(/["']/g, '');
              } catch(e) {}
            }
            // 제목 생성 실패 시 날짜+시간으로 대체
            if (!autoTitle) {
              const now = new Date();
              autoTitle = `운전메모_${now.getMonth()+1}월${now.getDate()}일_${now.getHours()}시${now.getMinutes()}분`;
            }

            // ── Step 3: Gemini 액션아이템 추출 + 자동 저장 ──
            hintEl.textContent = '💾 Step 3/3 — 저장 중...';
            let actionText = '';
            if (geminiKey && transcriptText) {
              try {
                const actionResult = await AbacusAI.callLLM(
                  `다음 텍스트에서 할 일, 연락, 일정, 확인 사항 등 액션 아이템만 추출해서 번호 목록으로 출력하세요. 없으면 "없음"이라고만 하세요:\n\n${transcriptText}`,
                  '액션 아이템 번호 목록만 출력하세요.'
                );
                if (actionResult && actionResult.trim() !== '없음') {
                  actionText = '\n\n✅ [AI 액션 아이템]\n' + actionResult.trim();
                }
              } catch(e) {}
            }

            // 오디오 Base64 변환 후 DB 자동 저장
            const audioReader = new FileReader();
            audioReader.onload = async () => {
              const finalContent = transcriptText
                ? transcriptText + actionText
                : '(음성 변환 실패 — 오디오 파일 확인)';

              // AI 자동 태그 생성
              let autoTags = ['운전메모', '음성'];
              if (geminiKey && transcriptText) {
                try {
                  const tagResult = await AbacusAI.callLLM(
                    `다음 텍스트의 핵심 키워드 3개를 쉼표로만 출력하세요:\n${transcriptText}`,
                    '키워드 3개를 쉼표로만 출력하세요.'
                  );
                  if (tagResult) {
                    const aiTags = tagResult.split(',').map(t => t.trim()).filter(Boolean);
                    autoTags = [...autoTags, ...aiTags].slice(0, 5);
                  }
                } catch(e) {}
              }

              await DB.addMemory({
                title: autoTitle,
                type: 'voice',
                content: finalContent,
                audioData: audioReader.result,
                tags: autoTags,
                priority: 'medium',
                folderId: null,
                encrypted: false
              });

              // 완료 UI
              timerEl.textContent = '✅';
              btn.innerHTML = '<span style="font-size:36px">🎉</span>';
              label.textContent = '저장 완료!';
              hintEl.innerHTML = `
                <span style="color:#4ade80;font-weight:600">"${autoTitle}"</span>
                <br>으로 자동 저장되었어요!
              `;
              UI.toast(`✅ "${autoTitle}" 자동 저장 완료!`, 'success');

              setTimeout(() => {
                if (driveModeOverlay) {
                  driveModeOverlay.remove();
                  driveModeOverlay = null;
                }
              }, 3000);
            };
            audioReader.readAsDataURL(blob);
          }, 300);
        }
      });

      exit.addEventListener('click', () => {
        // 녹음 중이면 먼저 중지
        if (driveRecording) {
          driveRecording = false;
          clearInterval(driveTimerInterval);
          _stopRecording();
        }
        if (driveModeOverlay) {
          driveModeOverlay.remove();
          driveModeOverlay = null;
        }
      });
    }

   // ✅ 화면 어둡게 기능

function toggleDimScreen() {
  if (dimOverlay) {
    // 밝기 복귀
    dimOverlay.remove();
    dimOverlay = null;
    UI.toast('화면 밝기 복귀됨 🌕', 'info');
  } else {
    // 화면을 거의 까맣게 (0.02 = 아주 약간만 빛남)
    dimOverlay = document.createElement('div');
    dimOverlay.style.cssText = `
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.97);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;

    `;
    dimOverlay.innerHTML = `
      <div style="
        width:12px;height:12px;

    // 탭하면 즉시 밝기 복귀
    dimOverlay.addEventListener('click', toggleDimScreen);

}

// 녹음 종료 시 dimOverlay 자동 제거

return { show, removeAudio, toggleDimScreen, showDriveMode };
  })();

  <script>
  /**
   * AbacusAI - LLM and Vision API service (only allowed fetch exception)
   */
  window.AbacusAI = (() => {
    // Gemini API 호출
    async function callLLM(prompt, systemPrompt = '') {
      // Try Gemini first, then Abacus
      const geminiKey = AppState.get('geminiApiKey');
      if (geminiKey) {
        return _callGemini(prompt, systemPrompt, geminiKey);
      }
      const apiKey = AppState.get('abacusApiKey');
      if (!apiKey) {
        UI.toast('설정에서 Gemini 또는 Abacus AI API 키를 입력하세요', 'info');
        return null;
      }
      try {
        const response = await fetch('https://apps.abacus.ai/api/v0/getCompletion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({
            prompt: prompt,
            systemMessage: systemPrompt || '당신은 도움이 되는 한국어 AI 어시스턴트입니다.',
            maxTokens: 500
          })
        });
        const data = await response.json();
        return data.result || data.completion || data.text || JSON.stringify(data);
      } catch (e) {
        console.error('AbacusAI Error:', e);
        throw e;
      }
    }

    async function _callGemini(prompt, systemPrompt, apiKey) {
      const model = AppState.get('geminiModel') || 'gemini-3.5-flash';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      const body = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: systemPrompt ? { parts: [{ text: systemPrompt }] } : undefined,
        generationConfig: { maxOutputTokens: 500 }
      };
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await response.json();
      if (data.candidates && data.candidates[0]) {
        return data.candidates[0].content?.parts?.[0]?.text || '';
      }
      throw new Error(data.error?.message || 'Gemini API error');
    }

    async function analyzeImage(base64Image) {
      const geminiKey = AppState.get('geminiApiKey');
      if (geminiKey) {
        return _analyzeImageGemini(base64Image, geminiKey);
      }
      const apiKey = AppState.get('abacusApiKey');
      if (!apiKey) {
        UI.toast('설정에서 Gemini API 키를 입력하세요', 'info');
        return null;
      }
      try {
        const response = await fetch('https://apps.abacus.ai/api/v0/getCompletion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({
            prompt: '이 이미지를 한국어로 상세히 설명해주세요.',
            images: [base64Image],
            maxTokens: 500
          })
        });
        const data = await response.json();
        return data.result || data.completion || data.text || JSON.stringify(data);
      } catch (e) {
        console.error('AbacusAI Vision Error:', e);
        throw e;
      }
    }

    async function _analyzeImageGemini(base64Image, apiKey) {
      const model = AppState.get('geminiProModel') || 'gemini-2.5-flash-preview-05-20';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      // Extract mime and base64 data
      const match = base64Image.match(/^data:(.*?);base64,(.*)$/);
      const mimeType = match ? match[1] : 'image/jpeg';
      const imageB64 = match ? match[2] : base64Image;
      const body = {
        contents: [{
          parts: [
            { text: '이 이미지를 한국어로 상세히 설명해주세요.' },
            { inlineData: { mimeType, data: imageB64 } }
          ]
        }],
        generationConfig: { maxOutputTokens: 500 }
      };
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await response.json();
      if (data.candidates && data.candidates[0]) {
        return data.candidates[0].content?.parts?.[0]?.text || '';
      }
      throw new Error(data.error?.message || 'Gemini Vision API error');
    }

    // Groq Whisper STT - 한국어 음성 인식
    async function transcribeAudio(audioBlob) {
      const groqKey = AppState.get('groqApiKey');
      if (!groqKey) {
        UI.toast('설정에서 Groq API 키를 입력하세요', 'info');
        return null;
      }
      const model = AppState.get('groqSttModel') || 'whisper-large-v3';
      const formData = new FormData();
      formData.append('file', audioBlob, 'audio.webm');
      formData.append('model', model);
      formData.append('language', 'ko');
      formData.append('response_format', 'json');

      const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${groqKey}` },
        body: formData
      });
      const data = await response.json();
      return data.text || '';
    }

    return { callLLM, analyzeImage, transcribeAudio };
  })();
  </script>

  <script>
  /**
   * AllMemoriesScreen - View all memories with filtering
   */
  window.AllMemoriesScreen = (() => {
    let filter = 'all';
    let folderFilter = null; // null = all, 0 = no folder, folderId number = specific folder
    let _folderFilterName = '';

    async function show(params = {}) {
      AppState.set('currentScreen', 'allMemories');
      AppState.set('currentTab', 'allMemories');
      if (!ContextMenu.isSelectionMode()) filter = 'all';
      // Support params.folderId for direct navigation from FolderListScreen
      if (params && params.folderId !== undefined) {
        folderFilter = params.folderId;
        _folderFilterName = params.folderName || '';
      } else if (!ContextMenu.isSelectionMode()) {
        folderFilter = null;
        _folderFilterName = '';
      }
      await HomeScreen._loadFolderMap();
      await _render();
    }

    async function _render() {
      // Load all memories first, then filter client-side
      let memories;
      if (filter === 'all') memories = await DB.getAllMemories();
      else memories = await DB.getMemoriesByType(filter);

      // Apply folder filter
      if (folderFilter === 0) {
        // "폴더 없음" - no folder assigned
        memories = memories.filter(m => !m.folderId);
      } else if (folderFilter && folderFilter !== null) {
        memories = memories.filter(m => m.folderId === folderFilter);
      }

      const inSelection = ContextMenu.isSelectionMode();
      const folders = await DB.getAllFolders();
      const folderMap = HomeScreen.getFolderMap();

      // Build title
      let screenTitle = '전체 기억';
      if (folderFilter === 0) screenTitle = '📂 폴더 없음';
      else if (folderFilter && folderMap[folderFilter]) screenTitle = '📁 ' + folderMap[folderFilter].name;

      const app = document.getElementById('app');
      app.innerHTML = `
        ${NavBar.render(screenTitle)}
        <div class="pb-24 nav-content-offset fade-in">
          <div class="p-4">
            ${inSelection ? `
              <div class="flex items-center justify-between mb-4">
                <span class="text-sm text-indigo-400 font-semibold">선택 모드 (${ContextMenu.getSelectedIds().size}개 선택)</span>
                <div class="flex gap-2">
                  <button onclick="ContextMenu.deleteSelected()" class="btn btn-danger text-xs">선택 삭제</button>
                  <button onclick="ContextMenu.exitSelectionMode()" class="btn btn-secondary text-xs">취소</button>
                </div>
              </div>
            ` : `<h2 class="text-lg font-bold mb-4">${screenTitle}</h2>`}

            <!-- Folder filter dropdown -->
            <div class="mb-3">
              <select id="folder-filter" style="width:100%;padding:8px 12px;border-radius:10px;background:#1e293b;border:1px solid #334155;color:#e2e8f0;font-size:13px;">
                <option value="all" ${folderFilter === null ? 'selected' : ''}>📂 전체 보기</option>
                <option value="0" ${folderFilter === 0 ? 'selected' : ''}>📂 폴더 없음</option>
                ${folders.map(f => `<option value="${f.id}" ${folderFilter === f.id ? 'selected' : ''}>${f.icon ? '' : '📁'} ${_escapeHtml(f.name)}</option>`).join('')}
              </select>
            </div>

            <!-- Type filter -->
            <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
              ${['all', 'text', 'image', 'document', 'voice'].map(t => `
                <button class="btn ${filter === t ? 'btn-primary' : 'btn-secondary'} text-xs whitespace-nowrap" onclick="AllMemoriesScreen.setFilter('${t}')">
                  ${t === 'all' ? '전체' : t === 'text' ? '📝 텍스트' : t === 'image' ? '🖼️ 이미지' : t === 'document' ? '📄 문서' : '🎤 음성'}
                </button>
              `).join('')}
            </div>
            <div id="memories-grid">
              ${memories.length ? memories.map(m => HomeScreen._renderMemoryCard(m)).join('') : `
                <div class="empty-state">
                  <div class="text-4xl mb-4">📭</div>
                  <p class="text-slate-500">기억이 없습니다</p>
                </div>
              `}
            </div>
          </div>
          ${_renderTabBar('allMemories')}
        </div>
      `;
      UI.refreshIcons();
      _bindLongPress();
      _bindFolderFilter();
    }

    function _bindFolderFilter() {
      const sel = document.getElementById('folder-filter');
      if (sel) {
        sel.addEventListener('change', (e) => {
          const val = e.target.value;
          if (val === 'all') folderFilter = null;
          else if (val === '0') folderFilter = 0;
          else folderFilter = parseInt(val);
          _render();
        });
      }
    }

    function _bindLongPress() {
      document.querySelectorAll('[data-memory-id]').forEach(card => {
        const id = parseInt(card.dataset.memoryId);
        ContextMenu.bindLongPress(card, id);
        card.addEventListener('click', (e) => {
          if (ContextMenu.isActive()) { e.preventDefault(); e.stopPropagation(); return; }
          if (ContextMenu.isSelectionMode()) { ContextMenu.toggleSelection(id); return; }
          App.navigate('viewMemory', { id });
        });
      });
    }

    function setFilter(f) { filter = f; _render(); }
    function setFolderFilter(fId, fName) { folderFilter = fId; _folderFilterName = fName || ''; _render(); }

    return { show, setFilter, setFolderFilter };
  })();
  </script>
