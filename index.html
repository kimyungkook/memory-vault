            ${memory.tags && memory.tags.length ? `
              <div class="flex flex-wrap gap-1">
                ${memory.tags.map(t => `<span class="tag">${_escapeHtml(t)}</span>`).join('')}
              </div>
            ` : ''}
          </div>
        </div>
      `;
     UI.refreshIcons();
      _loadRelatedMemories(memory);
    }

    async function _loadRelatedMemories(memory) {
      const keywords = [
        ...(memory.title || '').split(/\s+/).filter(w => w.length > 1),
        ...(memory.tags || [])
      ].slice(0, 5);
      if (keywords.length === 0) return;

      const all = await DB.getAllMemories();
      const related = all.filter(m => {
        if (m.id === memory.id) return false;
        const hay = ((m.title || '') + ' ' + (m.content || '') + ' ' + (m.tags || []).join(' ')).toLowerCase();
        return keywords.some(kw => hay.includes(kw.toLowerCase()));
      }).slice(0, 4);

      if (related.length === 0) return;
      const container = document.querySelector('.space-y-4');
      if (!container) return;

      const section = document.createElement('div');
      section.innerHTML = `
        <div style="margin-top:8px">
          <p style="font-size:12px;color:#a5b4fc;font-weight:600;margin-bottom:8px">🔗 연관 기억 (${related.length}개)</p>
          ${related.map(m => `
            <div onclick="App.navigate('viewMemory',{id:${m.id}})"
              style="background:#0f172a;border:1px solid #334155;border-radius:10px;
                     padding:10px 12px;margin-bottom:6px;cursor:pointer;">
              <p style="font-size:13px;font-weight:500;color:#e2e8f0;margin:0 0 2px">${_escapeHtml(m.title || '제목 없음')}</p>
              <p style="font-size:11px;color:#64748b;margin:0">${UI.formatDate(m.createdAt)} · ${m.type === 'text' ? '📝' : m.type === 'image' ? '🖼️' : m.type === 'document' ? '📄' : '🎤'}</p>
            </div>
          `).join('')}
        </div>
      `;
      container.appendChild(section);
    }

    function edit(id) {
      DB.getMemory(id).then(m => {
        if (m) {
          if (m.type === 'text') App.navigate('addMemory', { type: 'text', id });
          else if (m.type === 'image') App.navigate('addMemory', { type: 'image', id });
          else if (m.type === 'document') App.navigate('addMemory', { type: 'document', id });
          else if (m.type === 'voice') App.navigate('addMemory', { type: 'voice', id });
        }
      });
    }

    function remove(id) {
      UI.confirm('기억 삭제', '이 기억을 삭제하시겠습니까? 복구할 수 없습니다.', async () => {
        await DB.deleteMemory(id);
        UI.toast('기억이 삭제되었습니다', 'success');
        App.navigate('home');
      }, '삭제');
    }

    function _dataUrlToBlob(dataUrl) {
      try {
        const [header, base64] = dataUrl.split(',');
        const mime = header.match(/:(.*?);/)?.[1] || 'application/octet-stream';
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return new Blob([bytes], { type: mime });
      } catch(e) {
        console.error('dataUrlToBlob error:', e);
        return null;
      }
    }

    function _triggerDownload(dataUrl, fileName) {
      const blob = _dataUrlToBlob(dataUrl);
      if (blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 200);
      } else {
        // fallback: direct data URL
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
    }

    async function downloadDoc(id) {
      const m = await DB.getMemory(id);
      if (m && m.docData) {
        _triggerDownload(m.docData, m.docName || 'document');
      } else {
        UI.toast('문서 데이터를 찾을 수 없습니다', 'error');
      }
    }

    async function downloadDocByIndex(id, index) {
      const m = await DB.getMemory(id);
      if (m && m.docDataList && m.docDataList[index]) {
        const doc = m.docDataList[index];
        _triggerDownload(doc.data, doc.name || 'document');
      } else {
        UI.toast('문서 데이터를 찾을 수 없습니다', 'error');
      }
    }

    let _ttsUtterance = null;
    let _ttsPlaying = false;

    function readAloud(id) {
      // 이미 재생 중이면 중지
      if (_ttsPlaying) {
        speechSynthesis.cancel();
        _ttsPlaying = false;
        UI.toast('🔇 읽기 중지', 'info');
        return;
      }
      DB.getMemory(id).then(async m => {
        if (!m) return;
        let text = m.title ? m.title + '. ' : '';
        let content = m.content || '';
        if (m.encrypted && AppState.get('pin')) {
          try { content = await CryptoUtil.decrypt(m.content, AppState.get('pin')); } catch(e) {}
        }
        text += content;
        if (!text.trim()) { UI.toast('읽을 내용이 없습니다', 'info'); return; }

        if (!('speechSynthesis' in window)) {
          UI.toast('이 기기는 TTS를 지원하지 않습니다', 'error'); return;
        }
        speechSynthesis.cancel();
        _ttsUtterance = new SpeechSynthesisUtterance(text);
        _ttsUtterance.lang = 'ko-KR';
        _ttsUtterance.rate = 1.0;
        _ttsUtterance.pitch = 1.0;
        // 한국어 목소리 선택 (있으면)
        const voices = speechSynthesis.getVoices();
        const koVoice = voices.find(v => v.lang.startsWith('ko'));
        if (koVoice) _ttsUtterance.voice = koVoice;

        _ttsUtterance.onstart = () => {
          _ttsPlaying = true;
          UI.toast('🔊 읽기 시작 — 다시 탭하면 중지', 'info');
        };
        _ttsUtterance.onend = () => { _ttsPlaying = false; };
        _ttsUtterance.onerror = () => { _ttsPlaying = false; };
        speechSynthesis.speak(_ttsUtterance);
      });
    }

    return { show, edit, remove, downloadDoc, downloadDocByIndex, readAloud };
  })();
  </script>

          if (ContextMenu.isSelectionMode()) { ContextMenu.toggleSelection(id); return; }
          App.navigate('viewMemory', { id });
        });
      });
    }

    async function openFolder(folderId) {
      // Navigate to AllMemoriesScreen with folder filter set
      const folders = await DB.getAllFolders();
      const folder = folders.find(f => f.id === folderId);
      const folderName = folder ? folder.name : '';
      App.navigate('allMemories', { folderId, folderName });

    function deleteFolder(id, name) {
      UI.confirm('폴더 삭제', `"${name}" 폴더를 삭제하시겠습니까?\n폴더 안의 기억은 삭제되지 않습니다.`, async () => {
        await DB.deleteFolder(id);
        UI.toast('폴더가 삭제되었습니다', 'success');
        show();
      }, '삭제');
    }

    return { show, showAddForm, viewFolder, openFolder, deleteFolder };
  })();

              <!-- About -->
              <div class="card text-center">
                <p class="text-xs text-slate-500">Memory Vault v1.7</p>
                <p class="text-xs text-slate-600">Powered by Gemini & Groq AI</p>
              </div>
            </div>
          </div>
          ${_renderTabBar('settings')}
        </div>
      `;
      UI.refreshIcons();

      document.getElementById('enc-toggle').addEventListener('change', async (e) => {
        AppState.set('encryptionEnabled', e.target.checked);
        await DB.setSetting('encryptionEnabled', e.target.checked);
        UI.toast(e.target.checked ? '암호화가 활성화되었습니다' : '암호화가 비활성화되었습니다', 'info');
      });

      document.getElementById('import-file').addEventListener('change', _handleImport);

      // Gemini model change listener
      const geminiModelEl = document.getElementById('gemini-model');
      if (geminiModelEl) {
        geminiModelEl.addEventListener('change', async (e) => {
          AppState.set('geminiModel', e.target.value);
          await DB.setSetting('geminiModel', e.target.value);
          UI.toast('Gemini 모델이 변경되었습니다: ' + e.target.value, 'success');
        });
      }

      // Groq model change listener
      const groqModelEl = document.getElementById('groq-model');
      if (groqModelEl) {
        groqModelEl.addEventListener('change', async (e) => {
          AppState.set('groqSttModel', e.target.value);
          await DB.setSetting('groqSttModel', e.target.value);
          UI.toast('음성 인식 모델이 변경되었습니다', 'success');
        });
      }
    }

    function changePin() {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-box fade-in">
          <h3 class="text-lg font-bold mb-4">PIN 변경</h3>
          <div class="space-y-3">
            <input type="password" id="old-pin" placeholder="현재 PIN (6자리)" maxlength="6" inputmode="numeric"/>
            <input type="password" id="new-pin" placeholder="새 PIN (6자리)" maxlength="6" inputmode="numeric"/>
            <input type="password" id="confirm-pin" placeholder="새 PIN 확인" maxlength="6" inputmode="numeric"/>
          </div>
          <div class="flex gap-3 justify-end mt-6">
            <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">취소</button>
            <button class="btn btn-primary" id="btn-change-pin">변경</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.querySelector('#btn-change-pin').onclick = async () => {
        const oldPin = overlay.querySelector('#old-pin').value;
        const newPin = overlay.querySelector('#new-pin').value;
        const confirmPin = overlay.querySelector('#confirm-pin').value;
        if (newPin.length !== 6) { UI.toast('PIN은 6자리여야 합니다', 'error'); return; }
        if (newPin !== confirmPin) { UI.toast('새 PIN이 일치하지 않습니다', 'error'); return; }
        const oldHash = await CryptoUtil.hashPin(oldPin);
        const storedHash = await DB.getSetting('pinHash');
        if (oldHash !== storedHash) { UI.toast('현재 PIN이 올바르지 않습니다', 'error'); return; }
        const newHash = await CryptoUtil.hashPin(newPin);
        await DB.setSetting('pinHash', newHash);
        AppState.set('pin', newPin);
        overlay.remove();
        UI.toast('PIN이 변경되었습니다', 'success');
      };
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }

    async function saveApiKeys() {
      const geminiKey = document.getElementById('gemini-key').value.trim();
      const groqKey = document.getElementById('groq-key').value.trim();
      AppState.set('geminiApiKey', geminiKey);
      AppState.set('groqApiKey', groqKey);
      await DB.setSetting('geminiApiKey', geminiKey);
      await DB.setSetting('groqApiKey', groqKey);
      UI.toast('API 키가 저장되었습니다', 'success');
    }

    // Backward compat
    async function saveApiKey() {
      await saveApiKeys();
    }

    async function exportData() {
      try {
        UI.showLoading('데이터 내보내기 중...');
        const data = await DB.exportAll();
        UI.hideLoading();
        UI.safeDownload(data, `memory-vault-backup-${new Date().toISOString().slice(0,10)}.json`);
        UI.toast('데이터가 내보내졌습니다', 'success');
      } catch (e) {
        UI.hideLoading();
        UI.toast('내보내기 실패', 'error');
      }
    }

    function _handleImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          UI.confirm('데이터 가져오기', '현재 모든 데이터가 대체됩니다. 계속하시겠습니까?', async () => {
            UI.showLoading('가져오는 중...');
            await DB.importAll(data);
            UI.hideLoading();
            UI.toast('데이터를 가져왔습니다', 'success');
            show();
          });
        } catch (err) {
          UI.toast('올바른 백업 파일이 아닙니다', 'error');
        }
      };
      reader.readAsText(file);
    }

    function clearData() {
      UI.confirm('모든 데이터 삭제', '모든 기억과 폴더가 삭제됩니다. 복구할 수 없습니다.', async () => {
        await DB.clearAll();
        UI.toast('모든 데이터가 삭제되었습니다', 'success');
        show();
      }, '삭제');
    }

    function lock() {
      AppState.set('isLocked', true);
      AppState.set('pin', null);
      LockScreen.show();
    }

    async function registerBiometric() {
      const currentPin = AppState.get('pin');
      if (!currentPin) { UI.toast('먼저 PIN으로 로그인하세요', 'error'); return; }
      if (!window.PublicKeyCredential) { UI.toast('이 기기는 생체인증 미지원', 'error'); return; }
      try {
        const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        if (!available) { UI.toast('지문센서를 찾을 수 없습니다', 'error'); return; }
        const credential = await navigator.credentials.create({
          publicKey: {
            challenge: window.crypto.getRandomValues(new Uint8Array(32)),
            rp: { name: '기억속 저장', id: location.hostname || 'localhost' },
            user: {
              id: window.crypto.getRandomValues(new Uint8Array(16)),
              name: 'memory-vault-user',
              displayName: '기억속 저장'
            },
            pubKeyCredParams: [
              { alg: -7, type: 'public-key' },
              { alg: -257, type: 'public-key' }
            ],
            authenticatorSelection: {
              authenticatorAttachment: 'platform', // 기기 내장 지문만
              userVerification: 'required',
              residentKey: 'preferred'
            },
            timeout: 60000
          }
        });
        const credId = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
        localStorage.setItem('mv_biometric_id', credId);
        await DB.setSetting('bioPin', currentPin); // PIN을 DB에 보관 (지문 성공 시 복원용)
        UI.toast('✅ 지문인식 등록 완료!', 'success');
        show(); // 설정 화면 새로고침
      } catch (e) {
        if (e.name === 'InvalidStateError') UI.toast('이미 등록된 지문입니다. 해제 후 재등록하세요', 'error');
        else if (e.name === 'NotAllowedError') UI.toast('지문 등록이 취소되었습니다', 'error');
        else UI.toast('지문 등록 실패: ' + e.message, 'error');
      }
    }

    function disableBiometric() {
      UI.confirm('지문인식 해제', '지문인식을 해제하시겠습니까?', async () => {
        localStorage.removeItem('mv_biometric_id');
        await DB.setSetting('bioPin', null);
        UI.toast('🗑️ 지문인식이 해제되었습니다', 'success');
        show();
      });
    }

    return { show, changePin, saveApiKey, saveApiKeys, exportData, clearData, lock, registerBiometric, disableBiometric };
  })();
  </script>

  <!-- ==================== APP ORCHESTRATOR ==================== -->
  <script>
  /**
   * App - Main entry point, router, navigation
   */
  window.App = (() => {
    const historyStack = [];
    const forwardStack = [];

    async function init() {
      try {
        await AppState.loadSettings();
        if (AppState.get('isLocked')) {
          LockScreen.show();
        } else {
          HomeScreen.show();
        }
      } catch (e) {
        console.error('App init error:', e);
        LockScreen.show();
      }
    }

    function navigate(screen, params = {}) {
      const current = AppState.get('currentScreen');
      if (current && current !== screen) {
        historyStack.push({ screen: current, params: {} });
        forwardStack.length = 0; // Clear forward when navigating new
      }

      _showScreen(screen, params);
    }

    function _showScreen(screen, params) {
      // Close any open context menu
      if (window.ContextMenu) ContextMenu.close();

      switch (screen) {
        case 'lock': LockScreen.show(); break;
        case 'home': HomeScreen.show(); break;
        case 'addMemory':
          const type = params.type || 'text';
          if (type === 'text') TextForm.show(params);
          else if (type === 'image') ImageForm.show(params);
          else if (type === 'document') DocumentForm.show(params);
          else if (type === 'voice') VoiceForm.show(params);
          else TextForm.show(params);
          break;
        case 'viewMemory': ViewMemoryScreen.show(params); break;
        case 'allMemories': AllMemoriesScreen.show(params); break;
        case 'folders': FolderListScreen.show(); break;
        case 'folderView':
          if (params.folderId) FolderListScreen.viewFolder(params.folderId);
          else FolderListScreen.show();
          break;
        case 'settings': SettingsScreen.show(); break;
        default: HomeScreen.show();
      }
    }

    function goBack() {
      if (historyStack.length > 0) {
        const current = AppState.get('currentScreen');
        forwardStack.push({ screen: current, params: {} });
        const prev = historyStack.pop();
        _showScreen(prev.screen, prev.params);
      } else {
        navigate('home');
      }
    }

    function goForward() {
      if (forwardStack.length > 0) {
        const current = AppState.get('currentScreen');
        historyStack.push({ screen: current, params: {} });
        const next = forwardStack.pop();
        _showScreen(next.screen, next.params);
      }
    }

    function canGoForward() {
      return forwardStack.length > 0;
    }

    function getHistoryLength() {
      return historyStack.length;
    }

    return { init, navigate, goBack, goForward, canGoForward, getHistoryLength };
  })();

  window.addEventListener('DOMContentLoaded', () => App.init());
  </script>
