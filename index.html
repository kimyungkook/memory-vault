        async function saveVoiceProfile() {
          const bioVal = document.getElementById('user-voice-bio').value.trim();
          const toneVal = document.getElementById('user-voice-tone').value.trim();
          await DB.setSetting('userVoiceBio', bioVal);
          await DB.setSetting('userVoiceTone', toneVal);
          UI.toast('나의 목소리 프로필이 업데이트되었습니다', 'success');
        }

        let guideMediaRecorder = null;
        let guideChunks = [];
        async function recordGuideVoice(btn) {
          if (guideMediaRecorder && guideMediaRecorder.state === 'recording') {
            guideMediaRecorder.stop();
            btn.textContent = '🎙️ 대조용 음성 녹음';
            btn.className = 'bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-[10px] font-bold';
            return;
          }
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            guideMediaRecorder = new MediaRecorder(stream);
            guideChunks = [];
            guideMediaRecorder.ondataavailable = e => guideChunks.push(e.data);
            guideMediaRecorder.onstop = async () => {
              const blob = new Blob(guideChunks, { type: 'audio/webm' });
              const reader = new FileReader();
              reader.onload = async () => {
                const base64Data = reader.result;
                await DB.setSetting('guideVoiceBase64', base64Data);

                // [초고도화] Web Audio API를 이용한 녹음 가이드 주파수(물리 피치) 정밀 디코딩 분석 실행
                try {
                  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                  const response = await fetch(base64Data);
                  const arrayBuffer = await response.arrayBuffer();
                  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                  
                  const channelData = audioBuffer.getChannelData(0);
                  const sampleRate = audioBuffer.sampleRate;
                  let peakCount = 0;
                  let prevVal = 0;
                  for (let i = 1; i < channelData.length; i++) {
                    const val = channelData[i];
                    if (val > 0.15 && prevVal <= 0.15) {
                      peakCount++;
                    }
                    prevVal = val;
                  }
                  const duration = audioBuffer.duration;
                  const estHz = Math.round(peakCount / duration);

                  let acousticsType = "안정적인 중저음 바리톤 대역 (남성 성향)";
                  if (estHz > 165) {
                    acousticsType = "맑고 선명한 테너 및 알토 대역 (여성/미음 성향)";
                  } else if (estHz < 100) {
                    acousticsType = "깊은 울림의 베이스 대역 (굵은 저음 성향)";
                  }
                  const finalAcoustics = estHz + " Hz - " + acousticsType;
                  
                  await DB.setSetting('guideVoiceAcoustics', finalAcoustics);
                  
                  const lbl = document.getElementById('guide-acoustics-lbl');
                  if (lbl) lbl.textContent = '🔊 물리 측정 성향: ' + finalAcoustics;
                } catch(ex) {
                  await DB.setSetting('guideVoiceAcoustics', '120 Hz - 차분한 중저음 음역대');
                }

                UI.toast('🎤 목소리 대조용 음성 등록 및 주파수 분석 완료!', 'success');
                const playBtn = document.getElementById('guide-play-btn');
                if (playBtn) playBtn.classList.remove('hidden');
              };
              reader.readAsDataURL(blob);
              stream.getTracks().forEach(t => t.stop());
            };
            guideMediaRecorder.start();
            btn.textContent = '⏹️ 녹음 중지';
            btn.className = 'bg-slate-600 text-white px-2 py-1 rounded text-[10px] font-bold animate-pulse';
          } catch(e) {
            UI.toast('마이크 권한이 필요합니다.', 'error');
          }
        }

        async function playGuideVoice() {
          const base64 = await DB.getSetting('guideVoiceBase64');
          if (!base64) {
            UI.toast('재생할 녹음본이 없습니다.', 'error');
            return;
          }
          const aud = new Audio(base64);
          aud.play();
        }

        return { show, changePin, saveApiKey, saveApiKeys, exportData, exportText, clearData, lock, registerBiometric, disableBiometric, setupFakePin, _saveFakePin, _clearFakePin, toggleVisibility, toggleProfileEdit, saveVoiceProfile, recordGuideVoice, playGuideVoice };
      })();
  </script>

              <button id="ghost-send" style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:white;font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;">↑</button>
            </div>
          </div>
        </div>
      `;
      _bindChat();
    }

    function _bubble(text, isUser) {
      const chat = document.getElementById('ghost-chat');
      if (!chat) return;
      const d = document.createElement('div');
      d.style.cssText = isUser
        ? 'align-self:flex-end;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:16px 16px 4px 16px;padding:10px 14px;max-width:80%;font-size:13px;line-height:1.7;'
        : 'align-self:flex-start;background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:16px 16px 16px 4px;padding:10px 14px;max-width:80%;font-size:13px;line-height:1.7;';
      d.textContent = text;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
      return d;
    }

    function _bindChat() {
      const input = document.getElementById('ghost-input');
      const sendBtn = document.getElementById('ghost-send');
      if (!input || !sendBtn) return;
      const send = async () => {
        const q = input.value.trim();
        if (!q) return;
        input.value = '';
        _bubble(q, true);
        _history.push({ role:'user', text: q });
        if (!AppState.get('geminiApiKey')) { _bubble('Gemini API 키가 필요합니다. 설정에서 등록하세요.', false); return; }
        const typing = _bubble('💭 생각 중...', false);
        try {
          const hist = _history.slice(-6).map(h => `${h.role==='user'?'질문':'답변'}: ${h.text}`).join('\n');
          const ans = await AbacusAI.callLLM(
            `당신은 아래 기억 데이터의 주인공 AI 분신입니다. 1인칭으로 3~5문장 자연스럽게 답하세요.\n\n[기억]\n${_ctx}\n\n[이전대화]\n${hist}\n\n[질문]\n${q}`,
            '사용자처럼 말하는 AI 분신. 1인칭, 자연스럽게.'
          );
          if (typing) typing.remove();
          const reply = ans || '잘 모르겠어요. 다시 물어봐 주세요.';
          _bubble(reply, false);
          _history.push({ role:'ghost', text: reply });
        } catch(e) {
          if (typing) typing.remove();
          _bubble('오류가 발생했어요. 다시 시도해주세요.', false);
        }
      };
      sendBtn.addEventListener('click', send);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
    }
    return { show };
  })();
  </script>

  <!-- ==================== SCREEN: NETWORK MAP (인맥관계도) ==================== -->
  <script>
  window.NetworkScreen = (() => {
 async function show() {
      AppState.set('currentScreen', 'network');
      const memories = await DB.getAllMemories();
      const speakerMap = {};
      const edges = {};

      for (const m of memories) {
        if (m.type !== 'voice' || !m.content || !m.content.trim().startsWith('[')) continue;
        try {
          const segs = JSON.parse(m.content);
          if (!Array.isArray(segs)) continue;
          
          const validSpeakers = segs
            .map(s => s.speaker)
            .filter(sp => typeof sp === 'string' && sp.trim().length > 0)
            .map(sp => sp.trim());
          
          const uniqueSpeakers = [...new Set(validSpeakers)];
          uniqueSpeakers.forEach(sp => { speakerMap[sp] = (speakerMap[sp]||0) + 1; });
          
          for (let i = 0; i < uniqueSpeakers.length; i++) {
            for (let j = i+1; j < uniqueSpeakers.length; j++) {
              const key = [uniqueSpeakers[i], uniqueSpeakers[j]].sort().join('|||');
              edges[key] = (edges[key]||0) + 1;
            }
          }
        } catch(e) {}
      }

      const nodes = Object.keys(speakerMap);
      const edgeList = Object.entries(edges).map(([k,c]) => ({ src: k.split('|||')[0], dst: k.split('|||')[1], count: c }));
      const voiceCount = memories.filter(m => m.type === 'voice').length;

      const app = document.getElementById('app');
      app.innerHTML = `
        ${NavBar.render('🕸️ 인맥 관계도')}
        <div style="padding-top:calc(44px + env(safe-area-inset-top));height:100vh;display:flex;flex-direction:column;">
          <div style="padding:8px 16px;background:#1e293b;border-bottom:1px solid #334155;font-size:12px;color:#64748b;">
            ${nodes.length}명 분석 · 음성 메모 ${voiceCount}건
          </div>
          ${nodes.length < 2 ? `
            <div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;color:#64748b;">
              <div>
                <div style="font-size:56px;margin-bottom:16px">🕸️</div>
                <p style="font-size:14px;color:#e2e8f0;font-weight:600;">관계도를 만들 인물이 부족합니다</p>
                <p style="font-size:12px;margin-top:8px;color:#94a3b8;line-height:1.6;">음성 메모를 남기고 화자(이름)를 지정해보세요.<br>2명 이상의 대화/인물이 등록되어야 연결됩니다.</p>
              </div>
            </div>
          ` : `
            <canvas id="net-canvas" style="flex:1;width:100%;touch-action:none;"></canvas>
            <div id="net-info" style="display:none;position:fixed;bottom:20px;left:12px;right:12px;background:#1e293b;border:1px solid #6366f1;border-radius:12px;padding:12px;font-size:13px;z-index:10;box-shadow: 0 10px 25px rgba(0,0,0,0.5);"></div>
          `}
        </div>
      `;

      if (nodes.length >= 2) {
        setTimeout(() => _draw(nodes, edgeList, speakerMap), 50);
      }
    }

    function _draw(nodes, edgeList, speakerMap) {
      const cvs = document.getElementById('net-canvas');
      if (!cvs) return;
      const ctx = cvs.getContext('2d');
      cvs.width = cvs.offsetWidth;
      cvs.height = cvs.offsetHeight;
      const W = cvs.width, H = cvs.height;
      const cx = W/2, cy = H/2;
      const R = Math.min(W, H) * 0.33;
      let hovered = null;

      // 노드 위치 계산 (원형 배치)
      const pos = {};
      nodes.forEach((n, i) => {
        const a = (i/nodes.length) * Math.PI * 2 - Math.PI/2;
        pos[n] = { x: cx + Math.cos(a)*R, y: cy + Math.sin(a)*R };
      });

      function render() {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);

        // 엣지 (연결선)
        edgeList.forEach(e => {
          const s = pos[e.src], t = pos[e.dst];
          if (!s || !t) return;
          ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y);
          ctx.strokeStyle = `rgba(99,102,241,${Math.min(0.9, 0.15 + e.count*0.2)})`;
          ctx.lineWidth = Math.min(5, 1 + e.count * 0.6); ctx.stroke();
          // 통화횟수 라벨
          ctx.fillStyle = '#475569'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
          ctx.fillText(`${e.count}회`, (s.x+t.x)/2, (s.y+t.y)/2 - 4);
        });

        // 노드
        nodes.forEach(n => {
          const p = pos[n]; if (!p) return;
          const isMe = n === '나';
          const r = isMe ? 30 : 22;
          const isHov = hovered === n;
          if (isHov) { ctx.shadowColor = '#6366f1'; ctx.shadowBlur = 24; }
          ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2);
          const g = ctx.createRadialGradient(p.x-4, p.y-4, 2, p.x, p.y, r);
          g.addColorStop(0, isMe ? '#818cf8' : '#475569');
          g.addColorStop(1, isMe ? '#4338ca' : '#1e293b');
          ctx.fillStyle = g; ctx.fill();
          ctx.strokeStyle = isHov ? '#a5b4fc' : (isMe ? '#6366f1' : '#334155');
          ctx.lineWidth = isHov ? 3 : 2; ctx.stroke();
          ctx.shadowBlur = 0;
          // 이름
          const short = n.length > 5 ? n.slice(0,5)+'…' : n;
          ctx.fillStyle = '#f1f5f9'; ctx.font = `${isMe?'bold ':''}11px sans-serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(short, p.x, p.y);
          // 빈도 뱃지
          ctx.fillStyle = '#64748b'; ctx.font = '9px sans-serif'; ctx.textBaseline = 'alphabetic';
          ctx.fillText(`${speakerMap[n]||0}회`, p.x, p.y + r + 12);
        });
      }

      render();

      function hitTest(x, y) {
        for (const n of nodes) {
          const p = pos[n]; if (!p) continue;
          if (Math.hypot(x-p.x, y-p.y) <= (n==='나'?30:22)+6) return n;
        }
        return null;
      }

      function handleTap(x, y) {
        const n = hitTest(x, y);
        hovered = n; render();
        const info = document.getElementById('net-info');
        if (!info) return;
        if (n) {
          const rels = edgeList.filter(e => e.src===n||e.dst===n).map(e => e.src===n?e.dst:e.src);
          info.style.display = 'block';
          info.innerHTML = `<strong style="color:#a5b4fc;font-size:14px;">${n}</strong> <span style="color:#64748b;font-size:11px;">총 ${speakerMap[n]||0}회 등장</span><br><span style="color:#94a3b8;font-size:12px;">연결: ${rels.length > 0 ? rels.join(', ') : '없음'}</span>`;
        } else {
          info.style.display = 'none';
        }
      }

      // 클릭 & 터치 (갤럭시 터치 최적화)
      cvs.addEventListener('click', (e) => {
        const r = cvs.getBoundingClientRect();
        handleTap(e.clientX - r.left, e.clientY - r.top);
      });
      cvs.addEventListener('touchend', (e) => {
        e.preventDefault();
        const t = e.changedTouches[0], r = cvs.getBoundingClientRect();
        handleTap(t.clientX - r.left, t.clientY - r.top);
      }, { passive: false });
    }

    return { show };
  })();
  </script>

  <!-- ==================== APP ORCHESTRATOR ==================== -->
  <script>
  /**
   * App - Main entry point, router, navigation
   */
  window.App = (() => {
    const historyStack = [];
    const forwardStack = [];

    async function init() {
      try {
        await AppState.loadSettings();
        if (AppState.get('isLocked')) {
          LockScreen.show();
        } else {
          HomeScreen.show();
        }
      } catch (e) {
        console.error('App init error:', e);
        LockScreen.show();
      }
    }

   function navigate(screen, params = {}) {
      // [추가됨] 화면을 이동할 때 재생 중인 모든 TTS와 오디오를 강제 정지(Kill Switch)
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
      document.querySelectorAll('audio').forEach(audioEl => {
        audioEl.pause();
        audioEl.src = '';
      });

      const current = AppState.get('currentScreen');
      if (current && current !== screen) {
        historyStack.push({ screen: current, params: {} });
        forwardStack.length = 0; // Clear forward when navigating new
      }

      _showScreen(screen, params);
    }

    function _showScreen(screen, params) {
      // Close any open context menu
      if (window.ContextMenu) ContextMenu.close();

      switch (screen) {
        case 'lock': LockScreen.show(); break;
        case 'home': HomeScreen.show(); break;
        case 'addMemory':
          const type = params.type || 'text';
          if (type === 'text') TextForm.show(params);
          else if (type === 'image') ImageForm.show(params);
          else if (type === 'document') DocumentForm.show(params);
          else if (type === 'voice') VoiceForm.show(params);
          else TextForm.show(params);
          break;
        case 'viewMemory': ViewMemoryScreen.show(params); break;
        case 'allMemories': AllMemoriesScreen.show(params); break;
        case 'folders': FolderListScreen.show(); break;
        case 'folderView':
          if (params.folderId) FolderListScreen.viewFolder(params.folderId);
          else FolderListScreen.show();
          break;
        case 'settings': SettingsScreen.show(); break;
        case 'ghost': GhostScreen.show(); break;
        case 'network': NetworkScreen.show(); break;
        case 'fakeHome': FakeHomeScreen.show(); break;
        default: HomeScreen.show();
      }
    }

    function goBack() {
      if (historyStack.length > 0) {
        const current = AppState.get('currentScreen');
        forwardStack.push({ screen: current, params: {} });
        const prev = historyStack.pop();
        _showScreen(prev.screen, prev.params);
      } else {
        navigate('home');
      }
    }

    function goForward() {
      if (forwardStack.length > 0) {
        const current = AppState.get('currentScreen');
        historyStack.push({ screen: current, params: {} });
        const next = forwardStack.pop();
        _showScreen(next.screen, next.params);
      }
    }

    function canGoForward() {
      return forwardStack.length > 0;
    }

    function getHistoryLength() {
      return historyStack.length;
    }

    return { init, navigate, goBack, goForward, canGoForward, getHistoryLength };
  })();
  window.addEventListener('DOMContentLoaded', () => {
    // [안전장치] Dexie(DB 라이브러리)가 CDN에서 아직 안 떴으면 최대 5초간 기다렸다 시작
    function _waitDexieThenInit(tries){
      if (typeof window.Dexie !== 'undefined') {
        App.init();
        return;
      }
      if (tries <= 0) {
        // 모든 CDN 실패 — 흰 화면 대신 안내 표시
        var app = document.getElementById('app');
        if (app) app.innerHTML = '<div style="padding:40px;text-align:center;color:#e2e8f0;">'
          + '<div style="font-size:48px;margin-bottom:16px;">📡</div>'
          + '<h2 style="font-size:18px;font-weight:bold;margin-bottom:8px;">네트워크 연결을 확인해 주세요</h2>'
          + '<p style="font-size:13px;color:#94a3b8;line-height:1.7;">앱 구동에 필요한 라이브러리를 불러오지 못했습니다.<br>인터넷 연결 후 새로고침하면 정상 작동합니다.</p>'
          + '<button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;border-radius:10px;background:#6366f1;color:#fff;border:none;font-size:14px;cursor:pointer;">🔄 새로고침</button>'
          + '</div>';
        console.error('[App] Dexie 로드 실패 — 네트워크 확인 필요');
        return;
      }
      setTimeout(function(){ _waitDexieThenInit(tries - 1); }, 250);
    }
    _waitDexieThenInit(20); // 250ms × 20 = 최대 5초 대기

    // ✅ 삼성 갤럭시 하드웨어 뒤로가기(<) 버튼 호환
    // 앱 진입 시 초기 히스토리 스택 생성
    history.pushState({ mvApp: true }, '');

    window.addEventListener('popstate', (e) => {
      // 하드웨어 뒤로가기 클릭 시
      const screen = AppState.get('currentScreen');

      // 잠금화면이면 앱 종료 (브라우저 기본 동작)
      if (screen === 'lock') {
        return;
      }

      // 홈화면이면 잠금
      if (screen === 'home') {
        history.pushState({ mvApp: true }, '');
        AppState.set('isLocked', true);
        AppState.set('pin', null);
        LockScreen.show();
        return;
      }

      // 나머지 화면은 이전 화면으로
      history.pushState({ mvApp: true }, '');
      App.goBack();
    });
  });
  </script>
